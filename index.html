<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SARR Institute | Application Received</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #0A1922;
            color: #E8F0F2;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.5;
        }

        .ui-overlay {
            position: relative;
            z-index: 100;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            pointer-events: none;
        }

        .greeting-container {
            max-width: 600px;
            width: 100%;
            pointer-events: auto;
            animation: cinematicFloat 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes cinematicFloat {
            0% { opacity: 0; transform: translateY(40px) scale(0.98); filter: blur(4px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .greeting-card {
            background: rgba(15, 33, 42, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(76, 175, 80, 0.4);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(76, 175, 80, 0.2) inset;
            padding: 48px 40px;
            text-align: center;
            transition: all 0.4s ease;
        }

        .greeting-card:hover {
            transform: translateY(-5px);
            border-color: rgba(76, 175, 80, 0.7);
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.4);
        }

        .success-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.25), rgba(46, 125, 50, 0.25));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            border: 2px solid rgba(76, 175, 80, 0.6);
            animation: gentlePulse 2s ease-in-out infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.3); transform: scale(1); }
            50% { box-shadow: 0 0 0 15px rgba(76, 175, 80, 0); transform: scale(1.02); }
        }

        .success-icon i {
            font-size: 44px;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .greeting-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #4CAF50);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .student-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #4CAF50;
            margin-bottom: 12px;
        }

        .application-id {
            background: rgba(76, 175, 80, 0.15);
            border-radius: 40px;
            padding: 8px 20px;
            display: inline-block;
            margin: 12px 0;
            font-family: monospace;
            font-size: 0.85rem;
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
            letter-spacing: 1px;
        }

        .reply-section {
            background: rgba(76, 175, 80, 0.08);
            border-radius: 32px;
            padding: 24px;
            margin: 24px 0;
            border: 1px solid rgba(76, 175, 80, 0.25);
        }

        .reply-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8AAEBF;
            margin-bottom: 8px;
        }

        .reply-time {
            font-size: 2rem;
            font-weight: 700;
            color: #4CAF50;
            margin-bottom: 8px;
        }

        .reply-description {
            font-size: 0.85rem;
            color: #9AAEB9;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 28px 0;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(10, 25, 34, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 16px 22px;
            min-width: 90px;
            border: 1px solid rgba(76, 175, 80, 0.3);
            transition: all 0.2s;
        }

        .countdown-number {
            font-size: 2rem;
            font-weight: 700;
            color: #4CAF50;
            font-family: monospace;
        }

        .countdown-label {
            font-size: 0.7rem;
            color: #8AAEBF;
            margin-top: 6px;
        }

        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #45a049, #2c6e2f);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #4CAF50;
            padding: 10px 26px;
            border-radius: 50px;
            color: #4CAF50;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-outline:hover {
            border-color: #4CAF50;
            color: #4CAF50;
            transform: translateY(-2px);
            background: rgba(76, 175, 80, 0.1);
        }

        .click-hint {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 25, 34, 0.85);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 50px;
            color: #4CAF50;
            font-size: 0.85rem;
            z-index: 200;
            pointer-events: none;
            animation: subtleHint 2s ease-in-out infinite;
            border: 1px solid rgba(76, 175, 80, 0.3);
            font-weight: 500;
            white-space: nowrap;
        }

        @keyframes subtleHint {
            0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.7; }
            50% { transform: translateX(-50%) translateY(-5px); opacity: 1; }
        }

        @media (max-width: 600px) {
            .greeting-card { padding: 32px 24px; }
            .greeting-title { font-size: 1.5rem; }
            .student-name { font-size: 1.2rem; }
            .reply-time { font-size: 1.4rem; }
            .countdown-item { padding: 12px 16px; min-width: 70px; }
            .countdown-number { font-size: 1.5rem; }
            .click-hint { white-space: nowrap; font-size: 0.7rem; padding: 8px 18px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="ui-overlay">
        <div class="greeting-container">
            <div class="greeting-card">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1 class="greeting-title">Application Received!</h1>
                <div class="student-name" id="studentName">Loading...</div>
                <div class="application-id" id="applicationId"></div>
                
                <div class="reply-section">
                    <div class="reply-label"><i class="fas fa-clock"></i> RESPONSE TIME REMAINING</div>
                    <div class="reply-time" id="replyTime">24 Hours</div>
                    <div class="reply-description">
                        <i class="fas fa-envelope"></i> Our admissions team will contact you within 24 hours
                    </div>
                </div>
                
                <div class="countdown" id="countdown">
                    <div class="countdown-item"><div class="countdown-number" id="hours">24</div><div class="countdown-label">Hours</div></div>
                    <div class="countdown-item"><div class="countdown-number" id="minutes">00</div><div class="countdown-label">Minutes</div></div>
                    <div class="countdown-item"><div class="countdown-number" id="seconds">00</div><div class="countdown-label">Seconds</div></div>
                </div>
                
                <div class="button-group">
                    <button class="btn-primary" id="backToFormBtn"><i class="fas fa-pen-fancy"></i> Back to Application</button>
                    <button class="btn-outline" id="trackBtn"><i class="fas fa-chart-line"></i> Track Status</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="click-hint" id="clickHint">
        <i class="fas fa-hand-pointer"></i> Click the android to continue
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // ========== SCENE SETUP WITH DARK BLUE THEME ==========
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0A1922);
        scene.fog = new THREE.FogExp2(0x0A1922, 0.012);
        
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 2.2, 7.5);
        camera.lookAt(0, 1.2, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);
        
        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 0.6;
        controls.enablePan = false;
        controls.target.set(0, 1.2, 0);
        controls.maxPolarAngle = Math.PI / 2.2;
        
        // ========== LIGHTING ==========
        const keyLight = new THREE.DirectionalLight(0xFFFFFF, 0.9);
        keyLight.position.set(3, 4, 3);
        keyLight.castShadow = true;
        keyLight.receiveShadow = true;
        keyLight.shadow.mapSize.width = 1024;
        keyLight.shadow.mapSize.height = 1024;
        scene.add(keyLight);
        
        const fillLight = new THREE.PointLight(0x4CAF50, 0.4);
        fillLight.position.set(-2, 2.5, 3);
        scene.add(fillLight);
        
        const rimLight = new THREE.PointLight(0x4CAF50, 0.5);
        rimLight.position.set(1.5, 2.8, -3);
        scene.add(rimLight);
        
        const backLight = new THREE.PointLight(0x2E7D32, 0.4);
        backLight.position.set(0, 2, -4.5);
        scene.add(backLight);
        
        const groundFill = new THREE.PointLight(0x4CAF50, 0.25);
        groundFill.position.set(0, -1, 0);
        scene.add(groundFill);
        
        // ========== PARTICLE SYSTEMS ==========
        const particleCount = 2000;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 26;
            positions[i*3+1] = (Math.random() - 0.5) * 16 + 1;
            positions[i*3+2] = (Math.random() - 0.5) * 20 - 6;
            colors[i*3] = 0.2 + Math.random() * 0.3;
            colors[i*3+1] = 0.6 + Math.random() * 0.3;
            colors[i*3+2] = 0.2 + Math.random() * 0.3;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const particleMat = new THREE.PointsMaterial({ size: 0.04, vertexColors: true, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        const dustCount = 1500;
        const dustGeo = new THREE.BufferGeometry();
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            dustPositions[i*3] = (Math.random() - 0.5) * 11;
            dustPositions[i*3+1] = Math.random() * 3.5;
            dustPositions[i*3+2] = (Math.random() - 0.5) * 9 + 2;
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0x4CAF50, size: 0.018, transparent: true, opacity: 0.2 });
        const dustParticles = new THREE.Points(dustGeo, dustMat);
        scene.add(dustParticles);
        
        // ========== GROUND REFLECTION ==========
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(12, 12),
            new THREE.MeshStandardMaterial({ color: 0x0A1922, roughness: 0.6, metalness: 0.2 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -1.4;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        const glowCircle = new THREE.Mesh(
            new THREE.CircleGeometry(1.6, 32),
            new THREE.MeshStandardMaterial({ color: 0x4CAF50, emissive: 0x4CAF50, emissiveIntensity: 0.12, transparent: true, opacity: 0.2, side: THREE.DoubleSide })
        );
        glowCircle.rotation.x = -Math.PI / 2;
        glowCircle.position.y = -1.38;
        scene.add(glowCircle);
        
        // ========== FEMALE ANDROID MODEL ==========
        const androidGroup = new THREE.Group();
        
        const metalMat = new THREE.MeshStandardMaterial({ color: 0x3A5A6E, metalness: 0.75, roughness: 0.25 });
        const darkMetalMat = new THREE.MeshStandardMaterial({ color: 0x2A4A5A, metalness: 0.7, roughness: 0.3 });
        const glowMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, emissive: 0x4CAF50, emissiveIntensity: 0.35, metalness: 0.8 });
        const skinMat = new THREE.MeshStandardMaterial({ color: 0x5D7A6E, metalness: 0.3, roughness: 0.4 });
        
        const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.5, 1.1, 32), metalMat);
        torso.position.y = -0.2;
        torso.castShadow = true;
        androidGroup.add(torso);
        
        const chestPlate = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.45, 0.15), glowMat);
        chestPlate.position.set(0, 0.15, 0.55);
        androidGroup.add(chestPlate);
        
        const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.25, 0.25, 24), darkMetalMat);
        neck.position.set(0, 0.65, 0.15);
        androidGroup.add(neck);
        
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.48, 64, 64), skinMat);
        head.position.set(0, 0.98, 0.1);
        androidGroup.add(head);
        
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, emissive: 0x4CAF50, emissiveIntensity: 0.6 });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 32, 32), eyeMat);
        leftEye.position.set(-0.18, 1.05, 0.52);
        androidGroup.add(leftEye);
        
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 32, 32), eyeMat);
        rightEye.position.set(0.18, 1.05, 0.52);
        androidGroup.add(rightEye);
        
        const highlightMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, emissive: 0x88AAFF, emissiveIntensity: 0.2 });
        const leftHighlight = new THREE.Mesh(new THREE.SphereGeometry(0.04, 24, 24), highlightMat);
        leftHighlight.position.set(-0.22, 1.08, 0.58);
        androidGroup.add(leftHighlight);
        
        const rightHighlight = new THREE.Mesh(new THREE.SphereGeometry(0.04, 24, 24), highlightMat);
        rightHighlight.position.set(0.14, 1.08, 0.58);
        androidGroup.add(rightHighlight);
        
        const mouthMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 });
        const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.03, 16, 32), mouthMat);
        mouth.rotation.x = 0.2;
        mouth.position.set(0, 0.88, 0.58);
        androidGroup.add(mouth);
        
        const hairMat = new THREE.MeshStandardMaterial({ color: 0x1A3A4A, metalness: 0.4, roughness: 0.5 });
        const hairBase = new THREE.Mesh(new THREE.SphereGeometry(0.52, 48, 48), hairMat);
        hairBase.position.set(0, 1.12, -0.05);
        hairBase.scale.set(0.95, 0.6, 0.8);
        androidGroup.add(hairBase);
        
        const leftHair = new THREE.Mesh(new THREE.SphereGeometry(0.2, 32, 32), hairMat);
        leftHair.position.set(-0.42, 1.05, 0.05);
        leftHair.scale.set(0.7, 0.5, 0.6);
        androidGroup.add(leftHair);
        
        const rightHair = new THREE.Mesh(new THREE.SphereGeometry(0.2, 32, 32), hairMat);
        rightHair.position.set(0.42, 1.05, 0.05);
        rightHair.scale.set(0.7, 0.5, 0.6);
        androidGroup.add(rightHair);
        
        const shoulderMat = new THREE.MeshStandardMaterial({ color: 0x4A6A7E, metalness: 0.7 });
        const leftShoulder = new THREE.Mesh(new THREE.SphereGeometry(0.22, 32, 32), shoulderMat);
        leftShoulder.position.set(-0.65, 0.52, 0.15);
        androidGroup.add(leftShoulder);
        
        const rightShoulder = new THREE.Mesh(new THREE.SphereGeometry(0.22, 32, 32), shoulderMat);
        rightShoulder.position.set(0.65, 0.52, 0.15);
        androidGroup.add(rightShoulder);
        
        const armMat = new THREE.MeshStandardMaterial({ color: 0x3A5A6E, metalness: 0.7 });
        const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.14, 0.85, 24), armMat);
        leftArm.position.set(-0.78, 0.15, 0.2);
        leftArm.rotation.z = 0.4;
        leftArm.rotation.x = 0.3;
        androidGroup.add(leftArm);
        
        const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.14, 0.85, 24), armMat);
        rightArm.position.set(0.78, 0.15, 0.2);
        rightArm.rotation.z = -0.4;
        rightArm.rotation.x = 0.3;
        androidGroup.add(rightArm);
        
        const leftForearm = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.55, 24), armMat);
        leftForearm.position.set(-1.02, -0.2, 0.35);
        leftForearm.rotation.z = 0.2;
        androidGroup.add(leftForearm);
        
        const rightForearm = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 0.55, 24), armMat);
        rightForearm.position.set(1.02, -0.2, 0.35);
        rightForearm.rotation.z = -0.2;
        androidGroup.add(rightForearm);
        
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, emissive: 0x4CAF50, emissiveIntensity: 0.4 });
        const leftRing = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.04, 16, 32), ringMat);
        leftRing.position.set(-1.05, -0.45, 0.4);
        leftRing.rotation.x = Math.PI / 2;
        androidGroup.add(leftRing);
        
        const rightRing = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.04, 16, 32), ringMat);
        rightRing.position.set(1.05, -0.45, 0.4);
        rightRing.rotation.x = Math.PI / 2;
        androidGroup.add(rightRing);
        
        const handMat = new THREE.MeshStandardMaterial({ color: 0x5D7A6E });
        const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), handMat);
        leftHand.position.set(-1.25, -0.48, 0.45);
        androidGroup.add(leftHand);
        
        const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.1, 24, 24), handMat);
        rightHand.position.set(1.25, -0.48, 0.45);
        androidGroup.add(rightHand);
        
        const legMat = new THREE.MeshStandardMaterial({ color: 0x2A4A5A, metalness: 0.65 });
        const leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.18, 0.9, 24), legMat);
        leftLeg.position.set(-0.32, -0.85, 0.05);
        androidGroup.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.18, 0.9, 24), legMat);
        rightLeg.position.set(0.32, -0.85, 0.05);
        androidGroup.add(rightLeg);
        
        const footMat = new THREE.MeshStandardMaterial({ color: 0x1A3A4A });
        const leftFoot = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.12, 0.45), footMat);
        leftFoot.position.set(-0.32, -1.28, 0.2);
        androidGroup.add(leftFoot);
        
        const rightFoot = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.12, 0.45), footMat);
        rightFoot.position.set(0.32, -1.28, 0.2);
        androidGroup.add(rightFoot);
        
        const coreMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, emissive: 0x4CAF50, emissiveIntensity: 0.5 });
        const energyCore = new THREE.Mesh(new THREE.SphereGeometry(0.18, 32, 32), coreMat);
        energyCore.position.set(0, 0.12, 0.68);
        androidGroup.add(energyCore);
        
        const androidParticleCount = 400;
        const androidParticleGeo = new THREE.BufferGeometry();
        const androidPositions = new Float32Array(androidParticleCount * 3);
        for (let i = 0; i < androidParticleCount; i++) {
            androidPositions[i*3] = (Math.random() - 0.5) * 2.8;
            androidPositions[i*3+1] = (Math.random() - 0.5) * 2.8 + 0.5;
            androidPositions[i*3+2] = (Math.random() - 0.5) * 2.2 + 0.5;
        }
        androidParticleGeo.setAttribute('position', new THREE.BufferAttribute(androidPositions, 3));
        const androidParticleMat = new THREE.PointsMaterial({ color: 0x4CAF50, size: 0.022, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
        const androidParticles = new THREE.Points(androidParticleGeo, androidParticleMat);
        androidGroup.add(androidParticles);
        
        const auraMatAndroid = new THREE.MeshStandardMaterial({ color: 0x4CAF50, emissive: 0x4CAF50, emissiveIntensity: 0.12, transparent: true, opacity: 0.12, side: THREE.BackSide });
        const auraSphere = new THREE.Mesh(new THREE.SphereGeometry(0.98, 32, 32), auraMatAndroid);
        auraSphere.position.set(0, 0.5, 0.2);
        androidGroup.add(auraSphere);
        
        scene.add(androidGroup);
        
        // ========== ANIMATION ==========
        let time = 0;
        let isWalking = true;
        let armSwing = 0;
        let corePulse = 0;
        
        androidGroup.position.x = -5;
        androidGroup.position.z = 0;
        androidGroup.position.y = -0.2;
        
        function createGentleCelebration() {
            const particleCount = 100;
            for (let i = 0; i < particleCount; i++) {
                const particle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.025, 8, 8),
                    new THREE.MeshStandardMaterial({ color: i % 2 === 0 ? 0x4CAF50 : 0x2E7D32, emissive: 0x4CAF50, emissiveIntensity: 0.3 })
                );
                particle.position.set((Math.random() - 0.5) * 2.5, Math.random() * 2.2, (Math.random() - 0.5) * 2);
                androidGroup.add(particle);
                let yPos = particle.position.y;
                let scale = 1;
                const animate = setInterval(() => {
                    yPos += 0.045;
                    scale *= 0.96;
                    particle.position.y = yPos;
                    particle.scale.set(scale, scale, scale);
                    if (yPos > 2.8 || scale < 0.12) {
                        clearInterval(animate);
                        androidGroup.remove(particle);
                    }
                }, 35);
            }
        }
        
        function animateScene() {
            requestAnimationFrame(animateScene);
            time += 0.016;
            armSwing += 0.18;
            corePulse += 0.05;
            
            const pulseScale = 1 + Math.sin(corePulse * 3) * 0.1;
            energyCore.scale.set(pulseScale, pulseScale, pulseScale);
            
            if (isWalking && androidGroup.position.x < 0) {
                androidGroup.position.x += 0.022;
                androidGroup.position.y = -0.2 + Math.sin(time * 8) * 0.025;
                leftArm.rotation.x = 0.3 + Math.sin(armSwing) * 0.45;
                rightArm.rotation.x = 0.3 - Math.sin(armSwing) * 0.45;
                head.rotation.z = Math.sin(armSwing * 1.8) * 0.05;
                androidGroup.rotation.z = Math.sin(armSwing * 1.8) * 0.02;
            } else if (isWalking && androidGroup.position.x >= 0) {
                isWalking = false;
                androidGroup.position.x = 0;
                createGentleCelebration();
                leftArm.rotation.x = 0.3;
                rightArm.rotation.x = 0.3;
            }
            
            if (!isWalking) {
                androidGroup.rotation.z = Math.sin(time * 0.5) * 0.015;
                androidGroup.position.y = -0.2 + Math.sin(time * 0.8) * 0.008;
                head.rotation.z = Math.sin(time * 0.6) * 0.03;
                head.rotation.x = Math.sin(time * 0.5) * 0.02;
                if (Math.floor(time * 8) % 180 === 0) {
                    leftEye.scale.y = 0.08;
                    rightEye.scale.y = 0.08;
                    setTimeout(() => { leftEye.scale.y = 1; rightEye.scale.y = 1; }, 100);
                }
                const eyeShiftX = Math.sin(time * 0.4) * 0.012;
                leftEye.position.x = -0.18 + eyeShiftX;
                rightEye.position.x = 0.18 + eyeShiftX;
            }
            
            particles.rotation.y += 0.0006;
            dustParticles.rotation.y -= 0.0004;
            androidParticles.rotation.y += 0.005;
            const auraPulse = 1 + Math.sin(time * 2) * 0.02;
            auraSphere.scale.set(auraPulse, auraPulse, auraPulse);
            
            if (!isWalking) {
                camera.position.x += (mouseX * 0.4 - camera.position.x) * 0.04;
                camera.position.y += (-mouseY * 0.3 + 2.2 - camera.position.y) * 0.04;
            }
            camera.lookAt(0, 1.2, 0);
            controls.update();
            renderer.render(scene, camera);
        }
        
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = (e.clientY / window.innerHeight) * 2 - 1;
        });
        
        animateScene();
        
        // ========== INTERACTION ==========
        const raycaster = new THREE.Raycaster();
        const clickPos = new THREE.Vector2();
        const CUSTOM_REDIRECT_URL = "https://sarrinstituteoftechnology.github.io/Enroll-Now";
        
        function onAndroidClick(event) {
            if (isWalking) return;
            clickPos.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            clickPos.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(clickPos, camera);
            const intersects = raycaster.intersectObject(androidGroup, true);
            if (intersects.length > 0) {
                const ripple = document.createElement('div');
                ripple.style.position = 'fixed';
                ripple.style.left = event.clientX + 'px';
                ripple.style.top = event.clientY + 'px';
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                ripple.style.background = 'radial-gradient(circle, #4CAF50, #2E7D32, transparent)';
                ripple.style.borderRadius = '50%';
                ripple.style.pointerEvents = 'none';
                ripple.style.zIndex = '2000';
                ripple.style.animation = 'rippleExpand 0.6s ease-out forwards';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
                showModal();
            }
        }
        
        function showModal() {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.background = 'rgba(10, 25, 34, 0.92)';
            modal.style.backdropFilter = 'blur(20px)';
            modal.style.zIndex = '3000';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.innerHTML = `
                <div style="background: #0F212A; border-radius: 48px; padding: 45px; max-width: 520px; width: 90%; border: 1px solid #4CAF50; box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4); text-align: center;">
                    <div style="margin-bottom: 20px;"><i class="fas fa-robot" style="font-size: 70px; color: #4CAF50;"></i></div>
                    <h2 style="color: #FFFFFF; margin: 15px 0 12px; font-size: 1.8rem;">Welcome Back!</h2>
                    <p style="color: #9AAEB9; margin-bottom: 30px; line-height: 1.6;">Continue your journey at SARR Institute of Technology. Your future awaits.</p>
                    <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
                        <button id="modalRedirectBtn" style="background: #4CAF50; border: none; padding: 14px 32px; border-radius: 50px; color: white; font-weight: 600; cursor: pointer;">
                            <i class="fas fa-paper-plane"></i> Continue Application
                        </button>
                        <button id="modalCloseBtn" style="background: transparent; border: 2px solid #4CAF50; padding: 12px 28px; border-radius: 50px; color: #4CAF50; cursor: pointer; font-weight: 500;">
                            <i class="fas fa-times"></i> Stay
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('modalRedirectBtn').onclick = () => window.location.href = CUSTOM_REDIRECT_URL;
            document.getElementById('modalCloseBtn').onclick = () => modal.remove();
        }
        
        const rippleStyle = document.createElement('style');
        rippleStyle.textContent = `@keyframes rippleExpand { 0% { transform: scale(0); opacity: 0.6; } 100% { transform: scale(25); opacity: 0; } }`;
        document.head.appendChild(rippleStyle);
        window.addEventListener('click', onAndroidClick);
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
        
        // ========== PERSISTENT 24-HOUR COUNTDOWN ==========
        const COUNTDOWN_STORAGE_KEY = 'sarr_24hr_countdown_start';
        const COUNTDOWN_DURATION_HOURS = 24;
        
        function getOrCreateCountdownStartTime() {
            let startTime = localStorage.getItem(COUNTDOWN_STORAGE_KEY);
            if (!startTime) {
                startTime = Date.now();
                localStorage.setItem(COUNTDOWN_STORAGE_KEY, startTime);
            }
            return parseInt(startTime);
        }
        
        function formatTimeUnit(value) {
            return value.toString().padStart(2, '0');
        }
        
        function updateCountdownDisplay() {
            const startTime = getOrCreateCountdownStartTime();
            const now = Date.now();
            const elapsed = now - startTime;
            const totalDurationMs = COUNTDOWN_DURATION_HOURS * 60 * 60 * 1000;
            const remaining = Math.max(0, totalDurationMs - elapsed);
            
            const hoursLeft = Math.floor(remaining / (1000 * 60 * 60));
            const minutesLeft = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
            const secondsLeft = Math.floor((remaining % (1000 * 60)) / 1000);
            
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const replyTimeEl = document.getElementById('replyTime');
            
            if (hoursEl) hoursEl.textContent = formatTimeUnit(hoursLeft);
            if (minutesEl) minutesEl.textContent = formatTimeUnit(minutesLeft);
            if (secondsEl) secondsEl.textContent = formatTimeUnit(secondsLeft);
            
            if (replyTimeEl) {
                if (remaining <= 0) {
                    replyTimeEl.textContent = "Ready!";
                } else {
                    replyTimeEl.textContent = `${hoursLeft} Hours ${minutesLeft} Min`;
                }
            }
            
            if (remaining <= 0) {
                if (hoursEl) hoursEl.textContent = '00';
                if (minutesEl) minutesEl.textContent = '00';
                if (secondsEl) secondsEl.textContent = '00';
            }
        }
        
        // ========== URL PARAMETERS ==========
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                name: params.get('name') || '',
                applicationId: params.get('appId') || '',
                email: params.get('email') || ''
            };
        }
        
        function formatName(name) {
            if (!name) return 'Valued Applicant';
            try { return decodeURIComponent(name); } catch(e) { return name; }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const params = getUrlParams();
            let studentName = formatName(params.name);
            const applicationId = params.applicationId || 'SARR-' + Date.now().toString(36).toUpperCase();
            
            const savedData = localStorage.getItem('sarr_last_applicant_soft');
            if ((!studentName || studentName === 'Valued Applicant') && savedData) {
                try {
                    const data = JSON.parse(savedData);
                    studentName = data.name || studentName;
                } catch(e) {}
            }
            
            const nameEl = document.getElementById('studentName');
            const idEl = document.getElementById('applicationId');
            if (nameEl) nameEl.textContent = studentName;
            if (idEl) idEl.textContent = applicationId;
            
            localStorage.setItem('sarr_last_applicant_soft', JSON.stringify({
                name: studentName,
                appId: applicationId,
                email: params.email
            }));
            
            updateCountdownDisplay();
            setInterval(updateCountdownDisplay, 1000);
            
            const backBtn = document.getElementById('backToFormBtn');
            const trackBtn = document.getElementById('trackBtn');
            
            if (backBtn) backBtn.onclick = () => { window.location.href = CUSTOM_REDIRECT_URL; };
            if (trackBtn) trackBtn.onclick = () => {
                alert(`Application ID: ${applicationId}\nName: ${studentName}\nResponse Time: Within 24 hours\n\nPlease check your email for updates.`);
            };
        });
    </script>
</body>
</html>
