<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SARR Institute | Calm & Clear Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #F5F3F0;  /* Soft warm base - easy on eyes */
            color: #2C4A3F;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.65;
        }

        .ui-overlay {
            position: relative;
            z-index: 100;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            pointer-events: none;
        }

        .greeting-container {
            max-width: 600px;
            width: 100%;
            pointer-events: auto;
            animation: cinematicFloat 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes cinematicFloat {
            0% { opacity: 0; transform: translateY(40px) scale(0.98); filter: blur(4px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .greeting-card {
            background: rgba(250, 248, 245, 0.88);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(100, 120, 110, 0.35);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(100, 120, 110, 0.15) inset;
            padding: 48px 40px;
            text-align: center;
            transition: all 0.4s ease;
        }

        .greeting-card:hover {
            transform: translateY(-5px);
            border-color: rgba(182, 123, 94, 0.4);
            box-shadow: 0 35px 55px rgba(0, 0, 0, 0.1);
        }

        .success-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, rgba(44, 90, 75, 0.2), rgba(182, 123, 94, 0.2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            border: 2px solid rgba(44, 90, 75, 0.5);
            animation: gentlePulse 2s ease-in-out infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(44, 90, 75, 0.2); transform: scale(1); }
            50% { box-shadow: 0 0 0 15px rgba(44, 90, 75, 0); transform: scale(1.02); }
        }

        .success-icon i {
            font-size: 44px;
            background: linear-gradient(135deg, #2C5A4B, #B67B5E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .greeting-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2C5A4B, #B67B5E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .student-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #B67B5E;
            margin-bottom: 12px;
        }

        .application-id {
            background: rgba(44, 90, 75, 0.12);
            border-radius: 40px;
            padding: 8px 20px;
            display: inline-block;
            margin: 12px 0;
            font-family: monospace;
            font-size: 0.85rem;
            color: #2C5A4B;
            border: 1px solid rgba(44, 90, 75, 0.25);
            letter-spacing: 1px;
        }

        .reply-section {
            background: rgba(44, 90, 75, 0.06);
            border-radius: 32px;
            padding: 24px;
            margin: 24px 0;
            border: 1px solid rgba(44, 90, 75, 0.2);
        }

        .reply-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8FAA9F;
            margin-bottom: 8px;
        }

        .reply-time {
            font-size: 2rem;
            font-weight: 700;
            color: #2C5A4B;
            margin-bottom: 8px;
        }

        .reply-description {
            font-size: 0.85rem;
            color: #6F7C72;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 28px 0;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(250, 248, 245, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 16px 22px;
            min-width: 90px;
            border: 1px solid rgba(44, 90, 75, 0.2);
            transition: all 0.2s;
        }

        .countdown-number {
            font-size: 2rem;
            font-weight: 700;
            color: #B67B5E;
            font-family: monospace;
        }

        .countdown-label {
            font-size: 0.7rem;
            color: #8FAA9F;
            margin-top: 6px;
        }

        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2C5A4B, #3F7864);
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(44, 90, 75, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #236851, #2C5A4B);
            box-shadow: 0 10px 20px rgba(44, 90, 75, 0.25);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #8FAA9F;
            padding: 10px 26px;
            border-radius: 50px;
            color: #2C5A4B;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-outline:hover {
            border-color: #B67B5E;
            color: #B67B5E;
            transform: translateY(-2px);
            background: rgba(182, 123, 94, 0.05);
        }

        .click-hint {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(250, 248, 245, 0.85);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 50px;
            color: #2C5A4B;
            font-size: 0.85rem;
            z-index: 200;
            pointer-events: none;
            animation: subtleHint 2s ease-in-out infinite;
            border: 1px solid rgba(44, 90, 75, 0.25);
            font-weight: 500;
            white-space: nowrap;
        }

        @keyframes subtleHint {
            0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.7; }
            50% { transform: translateX(-50%) translateY(-5px); opacity: 1; }
        }

        @media (max-width: 600px) {
            .greeting-card { padding: 32px 24px; }
            .greeting-title { font-size: 1.5rem; }
            .student-name { font-size: 1.2rem; }
            .reply-time { font-size: 1.4rem; }
            .countdown-item { padding: 12px 16px; min-width: 70px; }
            .countdown-number { font-size: 1.5rem; }
            .click-hint { white-space: nowrap; font-size: 0.7rem; padding: 8px 18px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="ui-overlay">
        <div class="greeting-container">
            <div class="greeting-card">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1 class="greeting-title">Application Received!</h1>
                <div class="student-name" id="studentName">Loading...</div>
                <div class="application-id" id="applicationId"></div>
                
                <div class="reply-section">
                    <div class="reply-label"><i class="fas fa-clock"></i> ESTIMATED RESPONSE TIME</div>
                    <div class="reply-time" id="replyTime">3-8 Hours</div>
                    <div class="reply-description">
                        <i class="fas fa-envelope"></i> Our admissions team will contact you shortly
                    </div>
                </div>
                
                <div class="countdown" id="countdown">
                    <div class="countdown-item"><div class="countdown-number" id="hours">00</div><div class="countdown-label">Hours</div></div>
                    <div class="countdown-item"><div class="countdown-number" id="minutes">00</div><div class="countdown-label">Minutes</div></div>
                    <div class="countdown-item"><div class="countdown-number" id="seconds">00</div><div class="countdown-label">Seconds</div></div>
                </div>
                
                <div class="button-group">
                    <button class="btn-primary" id="backToFormBtn"><i class="fas fa-pen-fancy"></i> Back to Application</button>
                    <button class="btn-outline" id="trackBtn"><i class="fas fa-chart-line"></i> Track Status</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="click-hint" id="clickHint">
        <i class="fas fa-hand-pointer"></i> Click the panda to continue
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
        
        // ========== SOOTHING SCENE SETUP ==========
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xF5F3F0);  // Soft warm background
        scene.fog = new THREE.FogExp2(0xF5F3F0, 0.012);
        
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 2.2, 7.5);
        camera.lookAt(0, 1.2, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);
        
        // Gentle Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 0.6;
        controls.enablePan = false;
        controls.target.set(0, 1.2, 0);
        controls.maxPolarAngle = Math.PI / 2.2;
        
        // ========== WARM & SOFT LIGHTING ==========
        // Main Key Light (Soft Warm)
        const keyLight = new THREE.DirectionalLight(0xE8DCCC, 0.9);
        keyLight.position.set(3, 4, 3);
        keyLight.castShadow = true;
        keyLight.receiveShadow = true;
        keyLight.shadow.mapSize.width = 1024;
        keyLight.shadow.mapSize.height = 1024;
        scene.add(keyLight);
        
        // Fill Light (Soft Cool)
        const fillLight = new THREE.PointLight(0x9ABFAA, 0.45);
        fillLight.position.set(-2, 2.5, 3);
        scene.add(fillLight);
        
        // Rim Light (Warm Accent)
        const rimLight = new THREE.PointLight(0xB67B5E, 0.5);
        rimLight.position.set(1.5, 2.8, -3);
        scene.add(rimLight);
        
        // Back Light (Soft)
        const backLight = new THREE.PointLight(0x8FAA9F, 0.4);
        backLight.position.set(0, 2, -4.5);
        scene.add(backLight);
        
        // Ground Ambient
        const groundFill = new THREE.PointLight(0x2C5A4B, 0.3);
        groundFill.position.set(0, -1, 0);
        scene.add(groundFill);
        
        // ========== PARTICLE SYSTEMS (Gentle Dust) ==========
        const particleCount = 2000;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 26;
            positions[i*3+1] = (Math.random() - 0.5) * 16 + 1;
            positions[i*3+2] = (Math.random() - 0.5) * 20 - 6;
            // Soft earthy tones
            colors[i*3] = 0.7 + Math.random() * 0.2;
            colors[i*3+1] = 0.6 + Math.random() * 0.25;
            colors[i*3+2] = 0.5 + Math.random() * 0.25;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const particleMat = new THREE.PointsMaterial({ size: 0.04, vertexColors: true, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // Floating Dust (Closer)
        const dustCount = 1500;
        const dustGeo = new THREE.BufferGeometry();
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            dustPositions[i*3] = (Math.random() - 0.5) * 11;
            dustPositions[i*3+1] = Math.random() * 3.5;
            dustPositions[i*3+2] = (Math.random() - 0.5) * 9 + 2;
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xCDDBCF, size: 0.018, transparent: true, opacity: 0.25 });
        const dustParticles = new THREE.Points(dustGeo, dustMat);
        scene.add(dustParticles);
        
        // ========== GROUND REFLECTION (Soft) ==========
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(12, 12),
            new THREE.MeshStandardMaterial({ color: 0xE8E4DD, roughness: 0.6, metalness: 0.1 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -1.4;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // Gentle Glow Circle
        const glowCircle = new THREE.Mesh(
            new THREE.CircleGeometry(1.6, 32),
            new THREE.MeshStandardMaterial({ color: 0x9ABFAA, emissive: 0x8FAA9F, emissiveIntensity: 0.1, transparent: true, opacity: 0.25, side: THREE.DoubleSide })
        );
        glowCircle.rotation.x = -Math.PI / 2;
        glowCircle.position.y = -1.38;
        scene.add(glowCircle);
        
        // ========== FRIENDLY PANDA MODEL (Softer Materials) ==========
        const pandaGroup = new THREE.Group();
        
        // Softer materials
        const blackFur = new THREE.MeshStandardMaterial({ color: 0x3A4A42, roughness: 0.55, metalness: 0.05 });
        const whiteFur = new THREE.MeshStandardMaterial({ color: 0xFCF8F2, roughness: 0.6 });
        const noseMaterial = new THREE.MeshStandardMaterial({ color: 0x8B6B4D, roughness: 0.4 });
        
        // Body
        const bodyGeo = new THREE.SphereGeometry(0.88, 80, 80);
        const body = new THREE.Mesh(bodyGeo, blackFur);
        body.scale.set(1.22, 0.9, 0.85);
        body.position.y = -0.35;
        body.castShadow = true;
        body.receiveShadow = true;
        pandaGroup.add(body);
        
        // Chest
        const chestGeo = new THREE.SphereGeometry(0.7, 80, 80);
        const chest = new THREE.Mesh(chestGeo, whiteFur);
        chest.scale.set(0.92, 0.72, 0.55);
        chest.position.set(0, -0.18, 0.65);
        chest.castShadow = true;
        pandaGroup.add(chest);
        
        // Head
        const headGeo = new THREE.SphereGeometry(0.7, 100, 100);
        const head = new THREE.Mesh(headGeo, whiteFur);
        head.position.set(0, 0.68, 0.28);
        head.castShadow = true;
        pandaGroup.add(head);
        
        // Ears
        const earGeo = new THREE.SphereGeometry(0.42, 64, 64);
        const leftEar = new THREE.Mesh(earGeo, blackFur);
        leftEar.position.set(-0.55, 1.12, 0.18);
        leftEar.scale.set(0.85, 0.7, 0.65);
        pandaGroup.add(leftEar);
        
        const rightEar = new THREE.Mesh(earGeo, blackFur);
        rightEar.position.set(0.55, 1.12, 0.18);
        rightEar.scale.set(0.85, 0.7, 0.65);
        pandaGroup.add(rightEar);
        
        // Eye Patches
        const patchGeo = new THREE.SphereGeometry(0.36, 80, 80);
        const leftPatch = new THREE.Mesh(patchGeo, blackFur);
        leftPatch.position.set(-0.5, 0.84, 0.76);
        leftPatch.scale.set(1.1, 0.92, 0.62);
        pandaGroup.add(leftPatch);
        
        const rightPatch = new THREE.Mesh(patchGeo, blackFur);
        rightPatch.position.set(0.5, 0.84, 0.76);
        rightPatch.scale.set(1.1, 0.92, 0.62);
        pandaGroup.add(rightPatch);
        
        // Eyes with Warm Glow
        const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.2, metalness: 0.1 });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.2, 64, 64), eyeWhiteMat);
        leftEye.position.set(-0.5, 0.85, 1.05);
        pandaGroup.add(leftEye);
        
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.2, 64, 64), eyeWhiteMat);
        rightEye.position.set(0.5, 0.85, 1.05);
        pandaGroup.add(rightEye);
        
        // Pupils
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x2C4A3F });
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.12, 64, 64), pupilMat);
        leftPupil.position.set(-0.5, 0.82, 1.18);
        pandaGroup.add(leftPupil);
        
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.12, 64, 64), pupilMat);
        rightPupil.position.set(0.5, 0.82, 1.18);
        pandaGroup.add(rightPupil);
        
        // Highlights
        const highlightMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF });
        const leftHighlight = new THREE.Mesh(new THREE.SphereGeometry(0.045, 32, 32), highlightMat);
        leftHighlight.position.set(-0.56, 0.91, 1.22);
        pandaGroup.add(leftHighlight);
        
        const rightHighlight = new THREE.Mesh(new THREE.SphereGeometry(0.045, 32, 32), highlightMat);
        rightHighlight.position.set(0.44, 0.91, 1.22);
        pandaGroup.add(rightHighlight);
        
        // Nose
        const nose = new THREE.Mesh(new THREE.SphereGeometry(0.14, 64, 64), noseMaterial);
        nose.position.set(0, 0.62, 1.15);
        pandaGroup.add(nose);
        
        // Cheek Fluff
        const cheekMat = new THREE.MeshStandardMaterial({ color: 0xE8DCC8 });
        const leftCheek = new THREE.Mesh(new THREE.SphereGeometry(0.13, 48, 48), cheekMat);
        leftCheek.position.set(-0.68, 0.55, 0.92);
        pandaGroup.add(leftCheek);
        
        const rightCheek = new THREE.Mesh(new THREE.SphereGeometry(0.13, 48, 48), cheekMat);
        rightCheek.position.set(0.68, 0.55, 0.92);
        pandaGroup.add(rightCheek);
        
        // Arms
        const armGeo = new THREE.CylinderGeometry(0.22, 0.28, 0.75, 24);
        const leftArm = new THREE.Mesh(armGeo, blackFur);
        leftArm.position.set(-0.86, 0.1, 0.48);
        leftArm.rotation.z = 0.55;
        leftArm.rotation.x = 0.25;
        pandaGroup.add(leftArm);
        
        const rightArm = new THREE.Mesh(armGeo, blackFur);
        rightArm.position.set(0.86, 0.1, 0.48);
        rightArm.rotation.z = -0.55;
        rightArm.rotation.x = 0.25;
        pandaGroup.add(rightArm);
        
        // Legs
        const legGeo = new THREE.CylinderGeometry(0.26, 0.32, 0.68, 24);
        const leftLeg = new THREE.Mesh(legGeo, blackFur);
        leftLeg.position.set(-0.5, -0.68, 0.28);
        pandaGroup.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(legGeo, blackFur);
        rightLeg.position.set(0.5, -0.68, 0.28);
        pandaGroup.add(rightLeg);
        
        // Gentle Aura
        const auraGeo = new THREE.SphereGeometry(1.3, 48, 48);
        const auraMat = new THREE.MeshStandardMaterial({ color: 0x9ABFAA, emissive: 0x8FAA9F, emissiveIntensity: 0.08, transparent: true, opacity: 0.1, side: THREE.BackSide });
        const aura = new THREE.Mesh(auraGeo, auraMat);
        pandaGroup.add(aura);
        
        scene.add(pandaGroup);
        
        // ========== GENTLE ANIMATION ==========
        let time = 0;
        let isWalking = true;
        let armSwing = 0;
        let blinked = false;
        
        pandaGroup.position.x = -5;
        pandaGroup.position.z = 0;
        
        // Celebration Effect (Subtle)
        function createGentleCelebration() {
            const particleCount = 60;
            for (let i = 0; i < particleCount; i++) {
                const particle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.028, 8, 8),
                    new THREE.MeshStandardMaterial({ color: i % 2 === 0 ? 0x9ABFAA : 0xB67B5E, emissive: 0x6A8F7A, emissiveIntensity: 0.2 })
                );
                particle.position.set(
                    (Math.random() - 0.5) * 2.5,
                    Math.random() * 2,
                    (Math.random() - 0.5) * 2
                );
                pandaGroup.add(particle);
                
                let yPos = particle.position.y;
                let scale = 1;
                const animate = setInterval(() => {
                    yPos += 0.04;
                    scale *= 0.96;
                    particle.position.y = yPos;
                    particle.scale.set(scale, scale, scale);
                    if (yPos > 2.8 || scale < 0.15) {
                        clearInterval(animate);
                        pandaGroup.remove(particle);
                    }
                }, 35);
            }
        }
        
        // Animation Loop
        function animateScene() {
            requestAnimationFrame(animateScene);
            time += 0.016;
            armSwing += 0.16;
            
            if (isWalking && pandaGroup.position.x < 0) {
                pandaGroup.position.x += 0.024;
                pandaGroup.position.y = Math.sin(time * 8) * 0.03;
                
                leftArm.rotation.x = 0.25 + Math.sin(armSwing) * 0.5;
                rightArm.rotation.x = 0.25 - Math.sin(armSwing) * 0.5;
                head.rotation.z = Math.sin(armSwing * 1.8) * 0.06;
                pandaGroup.rotation.z = Math.sin(armSwing * 1.8) * 0.025;
            } else if (isWalking && pandaGroup.position.x >= 0) {
                isWalking = false;
                pandaGroup.position.x = 0;
                createGentleCelebration();
                leftArm.rotation.x = 0.25;
                rightArm.rotation.x = 0.25;
            }
            
            if (!isWalking) {
                pandaGroup.rotation.z = Math.sin(time * 0.5) * 0.02;
                pandaGroup.position.y = Math.sin(time * 0.8) * 0.01;
                head.rotation.z = Math.sin(time * 0.6) * 0.035;
                
                // Gentle blink
                if (!blinked && Math.floor(time * 6) % 160 === 0) {
                    blinked = true;
                    leftPupil.scale.y = 0.08;
                    rightPupil.scale.y = 0.08;
                    setTimeout(() => {
                        leftPupil.scale.y = 1;
                        rightPupil.scale.y = 1;
                        blinked = false;
                    }, 100);
                }
                
                // Soft eye movement
                const eyeShiftX = Math.sin(time * 0.35) * 0.012;
                leftPupil.position.x = -0.5 + eyeShiftX;
                rightPupil.position.x = 0.5 + eyeShiftX;
            }
            
            // Gentle particle drift
            particles.rotation.y += 0.0006;
            dustParticles.rotation.y -= 0.0004;
            
            // Aura gentle pulse
            const pulse = 1 + Math.sin(time * 2) * 0.02;
            aura.scale.set(pulse, pulse, pulse);
            
            // Soft camera drift
            if (!isWalking) {
                camera.position.x += (mouseX * 0.4 - camera.position.x) * 0.04;
                camera.position.y += (-mouseY * 0.3 + 2.2 - camera.position.y) * 0.04;
            }
            camera.lookAt(0, 1.2, 0);
            controls.update();
            renderer.render(scene, camera);
        }
        
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = (e.clientY / window.innerHeight) * 2 - 1;
        });
        
        animateScene();
        
        // ========== INTERACTION WITH RAYCASTER ==========
        const raycaster = new THREE.Raycaster();
        const clickPos = new THREE.Vector2();
        
        const CUSTOM_REDIRECT_URL = "https://sarrinstituteoftechnology.github.io/Enroll-Now";
        
        function onPandaClick(event) {
            if (isWalking) return;
            
            clickPos.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            clickPos.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(clickPos, camera);
            const intersects = raycaster.intersectObject(pandaGroup, true);
            
            if (intersects.length > 0) {
                // Gentle ripple effect
                const ripple = document.createElement('div');
                ripple.style.position = 'fixed';
                ripple.style.left = event.clientX + 'px';
                ripple.style.top = event.clientY + 'px';
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                ripple.style.background = 'radial-gradient(circle, #B67B5E, #9ABFAA, transparent)';
                ripple.style.borderRadius = '50%';
                ripple.style.pointerEvents = 'none';
                ripple.style.zIndex = '2000';
                ripple.style.animation = 'rippleExpand 0.6s ease-out forwards';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
                
                showModal();
            }
        }
        
        function showModal() {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.background = 'rgba(245, 243, 240, 0.92)';
            modal.style.backdropFilter = 'blur(20px)';
            modal.style.zIndex = '3000';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            
            modal.innerHTML = `
                <div style="background: white; border-radius: 48px; padding: 45px; max-width: 520px; width: 90%; border: 1px solid rgba(44, 90, 75, 0.2); box-shadow: 0 30px 50px rgba(0, 0, 0, 0.08); text-align: center;">
                    <div style="margin-bottom: 20px;">
                        <i class="fas fa-panda" style="font-size: 70px; color: #2C5A4B;"></i>
                    </div>
                    <h2 style="color: #2C5A4B; margin: 15px 0 12px; font-size: 1.8rem;">Welcome Back!</h2>
                    <p style="color: #6F7C72; margin-bottom: 30px; line-height: 1.6;">Continue your journey at SARR Institute of Technology. Your future awaits.</p>
                    <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
                        <button id="modalRedirectBtn" style="background: #2C5A4B; border: none; padding: 14px 32px; border-radius: 50px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s;">
                            <i class="fas fa-paper-plane"></i> Continue Application
                        </button>
                        <button id="modalCloseBtn" style="background: transparent; border: 2px solid #8FAA9F; padding: 12px 28px; border-radius: 50px; color: #2C5A4B; cursor: pointer; font-weight: 500;">
                            <i class="fas fa-times"></i> Stay
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            document.getElementById('modalRedirectBtn').onclick = () => {
                window.location.href = CUSTOM_REDIRECT_URL;
            };
            
            document.getElementById('modalCloseBtn').onclick = () => {
                modal.remove();
            };
        }
        
        const rippleStyle = document.createElement('style');
        rippleStyle.textContent = `
            @keyframes rippleExpand {
                0% { transform: scale(0); opacity: 0.6; }
                100% { transform: scale(25); opacity: 0; }
            }
        `;
        document.head.appendChild(rippleStyle);
        
        window.addEventListener('click', onPandaClick);
        
        // ========== RESIZE ==========
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
        
        // ========== COUNTDOWN TIMER ==========
        function getStoredTargetTime() {
            let targetTime = localStorage.getItem('sarr_reply_target_soft');
            if (!targetTime) {
                const randomHours = Math.floor(Math.random() * (8 - 3 + 1) + 3);
                targetTime = new Date().getTime() + (randomHours * 60 * 60 * 1000);
                localStorage.setItem('sarr_reply_target_soft', targetTime);
                localStorage.setItem('sarr_reply_hours_soft', randomHours);
            }
            return parseInt(targetTime);
        }
        
        function getStoredReplyHours() {
            let hours = localStorage.getItem('sarr_reply_hours_soft');
            if (!hours) {
                hours = Math.floor(Math.random() * (8 - 3 + 1) + 3);
                localStorage.setItem('sarr_reply_hours_soft', hours);
            }
            return parseInt(hours);
        }
        
        function updateCountdown() {
            const targetTime = getStoredTargetTime();
            const now = new Date().getTime();
            const distance = targetTime - now;
            
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const replyTimeEl = document.getElementById('replyTime');
            
            if (distance < 0) {
                if (hoursEl) hoursEl.textContent = '00';
                if (minutesEl) minutesEl.textContent = '00';
                if (secondsEl) secondsEl.textContent = '00';
                if (replyTimeEl) replyTimeEl.textContent = 'Ready!';
                return;
            }
            
            const hoursLeft = Math.floor(distance / (1000 * 60 * 60));
            const minutesLeft = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const secondsLeft = Math.floor((distance % (1000 * 60)) / 1000);
            
            if (hoursEl) hoursEl.textContent = hoursLeft.toString().padStart(2, '0');
            if (minutesEl) minutesEl.textContent = minutesLeft.toString().padStart(2, '0');
            if (secondsEl) secondsEl.textContent = secondsLeft.toString().padStart(2, '0');
            
            const totalHours = getStoredReplyHours();
            if (replyTimeEl) replyTimeEl.textContent = `${totalHours} Hours ${minutesLeft} Min`;
        }
        
        // ========== URL PARAMETERS ==========
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                name: params.get('name') || '',
                applicationId: params.get('appId') || '',
                email: params.get('email') || ''
            };
        }
        
        function formatName(name) {
            if (!name) return 'Valued Applicant';
            try {
                return decodeURIComponent(name);
            } catch (e) {
                return name;
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const params = getUrlParams();
            let studentName = formatName(params.name);
            const applicationId = params.applicationId || 'SARR-' + Date.now().toString(36).toUpperCase();
            
            const savedData = localStorage.getItem('sarr_last_applicant_soft');
            if ((!studentName || studentName === 'Valued Applicant') && savedData) {
                try {
                    const data = JSON.parse(savedData);
                    studentName = data.name || studentName;
                } catch(e) {}
            }
            
            const nameEl = document.getElementById('studentName');
            const idEl = document.getElementById('applicationId');
            if (nameEl) nameEl.textContent = studentName;
            if (idEl) idEl.textContent = applicationId;
            
            localStorage.setItem('sarr_last_applicant_soft', JSON.stringify({
                name: studentName,
                appId: applicationId,
                email: params.email
            }));
            
            updateCountdown();
            setInterval(updateCountdown, 1000);
            
            const backBtn = document.getElementById('backToFormBtn');
            const trackBtn = document.getElementById('trackBtn');
            
            if (backBtn) backBtn.onclick = () => {
                window.location.href = CUSTOM_REDIRECT_URL;
            };
            
            if (trackBtn) trackBtn.onclick = () => {
                alert(`📋 Application ID: ${applicationId}\n👤 Name: ${studentName}\n⏰ Expected Response: Within ${getStoredReplyHours()} hours\n\nPlease check your email for updates.`);
            };
        });
    </script>
</body>
</html>
