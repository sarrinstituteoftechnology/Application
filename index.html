<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SARR Institute | 3D Panda Greeting | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #0A192F;
            color: #fff;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .ui-overlay {
            position: relative;
            z-index: 100;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            pointer-events: none;
        }

        .greeting-container {
            max-width: 600px;
            width: 100%;
            pointer-events: auto;
            animation: floatIn 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(60px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .greeting-card {
            background: rgba(10, 25, 47, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(102, 252, 241, 0.3);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(102, 252, 241, 0.15) inset;
            padding: 48px 40px;
            text-align: center;
            transition: all 0.4s ease;
        }

        .greeting-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 50px 90px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(102, 252, 241, 0.25) inset;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(102, 252, 241, 0.2), rgba(195, 7, 63, 0.2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            border: 2px solid rgba(102, 252, 241, 0.6);
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 252, 241, 0.4); border-color: rgba(102, 252, 241, 0.6); }
            50% { box-shadow: 0 0 0 20px rgba(102, 252, 241, 0); border-color: rgba(102, 252, 241, 1); }
        }

        .success-icon i {
            font-size: 48px;
            background: linear-gradient(135deg, #66FCF1, #C3073F);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .greeting-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #66FCF1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .student-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #66FCF1;
            margin-bottom: 16px;
            text-shadow: 0 0 20px rgba(102, 252, 241, 0.5);
        }

        .application-id {
            background: rgba(102, 252, 241, 0.12);
            border-radius: 40px;
            padding: 10px 24px;
            display: inline-block;
            margin: 15px 0;
            font-family: monospace;
            font-size: 0.85rem;
            color: #66FCF1;
            border: 1px solid rgba(102, 252, 241, 0.3);
        }

        .reply-section {
            background: linear-gradient(135deg, rgba(102, 252, 241, 0.08), rgba(195, 7, 63, 0.05));
            border-radius: 32px;
            padding: 28px;
            margin: 30px 0;
            border: 1px solid rgba(102, 252, 241, 0.25);
            position: relative;
            overflow: hidden;
        }

        .reply-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 252, 241, 0.1), transparent 70%);
            animation: shimmerSlow 6s ease-in-out infinite;
        }

        @keyframes shimmerSlow {
            0% { transform: translate(-20%, -20%) rotate(0deg); opacity: 0; }
            50% { transform: translate(0%, 0%) rotate(5deg); opacity: 0.5; }
            100% { transform: translate(20%, 20%) rotate(10deg); opacity: 0; }
        }

        .reply-time {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #66FCF1, #C3073F);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .reply-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #9BB4D4;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .reply-description {
            color: #CCDEFF;
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(10, 20, 35, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 15px 22px;
            min-width: 90px;
            border: 1px solid rgba(102, 252, 241, 0.25);
            transition: all 0.3s;
        }

        .countdown-number {
            font-size: 2rem;
            font-weight: 800;
            color: #66FCF1;
            font-family: monospace;
        }

        .countdown-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #9BB4D4;
            margin-top: 6px;
        }

        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #66FCF1, #2C5F8A);
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            color: #0A1428;
            font-weight: 700;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(102, 252, 241, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #66FCF1;
            padding: 12px 28px;
            border-radius: 60px;
            color: #66FCF1;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-outline:hover {
            background: rgba(102, 252, 241, 0.1);
            transform: translateY(-2px);
        }

        .click-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 24px;
            border-radius: 50px;
            color: #66FCF1;
            font-size: 0.85rem;
            z-index: 200;
            pointer-events: none;
            animation: bounceHint 1.5s ease-in-out infinite;
            border: 1px solid rgba(102, 252, 241, 0.3);
            white-space: nowrap;
        }

        @keyframes bounceHint {
            0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.7; }
            50% { transform: translateX(-50%) translateY(-8px); opacity: 1; }
        }

        @media (max-width: 600px) {
            .greeting-card { padding: 32px 24px; }
            .greeting-title { font-size: 1.6rem; }
            .student-name { font-size: 1.3rem; }
            .reply-time { font-size: 1.5rem; }
            .countdown-item { padding: 10px 16px; min-width: 70px; }
            .countdown-number { font-size: 1.4rem; }
            .click-hint { font-size: 0.7rem; padding: 6px 16px; white-space: nowrap; bottom: 15px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="ui-overlay">
        <div class="greeting-container">
            <div class="greeting-card">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1 class="greeting-title">Application Received!</h1>
                <div class="student-name" id="studentName">Loading...</div>
                <div class="application-id" id="applicationId"></div>
                
                <div class="reply-section">
                    <div class="reply-label"><i class="fas fa-clock"></i> ESTIMATED RESPONSE TIME</div>
                    <div class="reply-time" id="replyTime">24-48 Hours</div>
                    <div class="reply-description">
                        <i class="fas fa-envelope"></i> Our admissions team will contact you shortly
                    </div>
                </div>
                
                <div class="countdown" id="countdown">
                    <div class="countdown-item"><div class="countdown-number" id="hours">00</div><div class="countdown-label">Hours</div></div>
                    <div class="countdown-item"><div class="countdown-number" id="minutes">00</div><div class="countdown-label">Minutes</div></div>
                    <div class="countdown-item"><div class="countdown-number" id="seconds">00</div><div class="countdown-label">Seconds</div></div>
                </div>
                
                <div class="button-group">
                    <button class="btn-primary" id="backToFormBtn"><i class="fas fa-pen-fancy"></i> Back to Application</button>
                    <button class="btn-outline" id="trackBtn"><i class="fas fa-chart-line"></i> Track Status</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="click-hint" id="clickHint">
        <i class="fas fa-hand-pointer"></i> Click on Panda to Return to Form
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // ========== INITIALIZE SCENE (Matches your index.html style) ==========
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0A192F);
        scene.fog = new THREE.FogExp2(0x0A192F, 0.006);
        
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 2.5, 8);
        camera.lookAt(0, 1.5, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);
        
        // ========== LIGHTS (Premium Realistic Lighting) ==========
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 8, 6);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x66FCF1, 0.4);
        fillLight.position.set(-3, 2, 4);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xC3073F, 0.3);
        backLight.position.set(0, 2, -5);
        scene.add(backLight);
        
        const rimLight = new THREE.PointLight(0x66FCF1, 0.5);
        rimLight.position.set(2, 3, -3);
        scene.add(rimLight);
        
        const groundLight = new THREE.PointLight(0x2C5F8A, 0.3);
        groundLight.position.set(0, -1, 0);
        scene.add(groundLight);
        
        // ========== FLOATING PARTICLES (Matches your index.html style) ==========
        const particleCount = 2000;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 25;
            positions[i*3+1] = (Math.random() - 0.5) * 15 + 1;
            positions[i*3+2] = (Math.random() - 0.5) * 20 - 8;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x66FCF1, size: 0.045, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // Ground shadow plane
        const shadowPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(8, 8),
            new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        shadowPlane.rotation.x = -Math.PI / 2;
        shadowPlane.position.y = -1.3;
        shadowPlane.receiveShadow = true;
        scene.add(shadowPlane);
        
        // ========== REALISTIC 3D PANDA MODEL ==========
        const pandaGroup = new THREE.Group();
        
        // Materials
        const blackFurMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.55, metalness: 0.05, emissive: 0x111111, emissiveIntensity: 0.1 });
        const whiteFurMat = new THREE.MeshStandardMaterial({ color: 0xf8f8f8, roughness: 0.5, metalness: 0.02 });
        const darkFurMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.6 });
        const noseMat = new THREE.MeshStandardMaterial({ color: 0x4a2a1a, roughness: 0.3, metalness: 0.1 });
        
        // Body (large oval)
        const bodyGeo = new THREE.SphereGeometry(0.85, 64, 64);
        const body = new THREE.Mesh(bodyGeo, blackFurMat);
        body.scale.set(1.2, 0.9, 0.8);
        body.position.y = -0.3;
        body.castShadow = true;
        body.receiveShadow = true;
        pandaGroup.add(body);
        
        // Chest (white patch)
        const chestGeo = new THREE.SphereGeometry(0.65, 64, 64);
        const chest = new THREE.Mesh(chestGeo, whiteFurMat);
        chest.scale.set(0.9, 0.7, 0.5);
        chest.position.set(0, -0.1, 0.65);
        chest.castShadow = true;
        pandaGroup.add(chest);
        
        // Head
        const headGeo = new THREE.SphereGeometry(0.68, 64, 64);
        const head = new THREE.Mesh(headGeo, whiteFurMat);
        head.position.set(0, 0.65, 0.25);
        head.castShadow = true;
        head.receiveShadow = true;
        pandaGroup.add(head);
        
        // Left Ear
        const earGeo = new THREE.SphereGeometry(0.42, 48, 48);
        const leftEar = new THREE.Mesh(earGeo, blackFurMat);
        leftEar.position.set(-0.55, 1.1, 0.15);
        leftEar.scale.set(0.9, 0.7, 0.7);
        leftEar.castShadow = true;
        pandaGroup.add(leftEar);
        
        // Right Ear
        const rightEar = new THREE.Mesh(earGeo, blackFurMat);
        rightEar.position.set(0.55, 1.1, 0.15);
        rightEar.scale.set(0.9, 0.7, 0.7);
        rightEar.castShadow = true;
        pandaGroup.add(rightEar);
        
        // Left Eye Patch
        const patchGeo = new THREE.SphereGeometry(0.32, 48, 48);
        const leftPatch = new THREE.Mesh(patchGeo, blackFurMat);
        leftPatch.position.set(-0.48, 0.8, 0.75);
        leftPatch.scale.set(1.1, 0.9, 0.6);
        leftPatch.castShadow = true;
        pandaGroup.add(leftPatch);
        
        // Right Eye Patch
        const rightPatch = new THREE.Mesh(patchGeo, blackFurMat);
        rightPatch.position.set(0.48, 0.8, 0.75);
        rightPatch.scale.set(1.1, 0.9, 0.6);
        rightPatch.castShadow = true;
        pandaGroup.add(rightPatch);
        
        // Eyes (realistic with depth)
        const eyeWhiteGeo = new THREE.SphereGeometry(0.2, 48, 48);
        const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, metalness: 0.9 });
        const leftEyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
        leftEyeWhite.position.set(-0.48, 0.82, 1.05);
        pandaGroup.add(leftEyeWhite);
        
        const rightEyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
        rightEyeWhite.position.set(0.48, 0.82, 1.05);
        pandaGroup.add(rightEyeWhite);
        
        // Pupils (dark with highlight)
        const pupilGeo = new THREE.SphereGeometry(0.12, 48, 48);
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.2, emissive: 0x111111 });
        const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
        leftPupil.position.set(-0.48, 0.79, 1.18);
        pandaGroup.add(leftPupil);
        
        const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
        rightPupil.position.set(0.48, 0.79, 1.18);
        pandaGroup.add(rightPupil);
        
        // Eye reflections (realistic shine)
        const highlightGeo = new THREE.SphereGeometry(0.045, 32, 32);
        const highlightMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x88aaff, emissiveIntensity: 0.4 });
        const leftHighlight = new THREE.Mesh(highlightGeo, highlightMat);
        leftHighlight.position.set(-0.53, 0.87, 1.22);
        pandaGroup.add(leftHighlight);
        
        const rightHighlight = new THREE.Mesh(highlightGeo, highlightMat);
        rightHighlight.position.set(0.43, 0.87, 1.22);
        pandaGroup.add(rightHighlight);
        
        // Nose (black, slightly wet look)
        const noseGeo = new THREE.SphereGeometry(0.13, 48, 48);
        const nose = new THREE.Mesh(noseGeo, noseMat);
        nose.position.set(0, 0.62, 1.15);
        nose.castShadow = true;
        pandaGroup.add(nose);
        
        // Nose tip highlight
        const noseTipGeo = new THREE.SphereGeometry(0.05, 32, 32);
        const noseTipMat = new THREE.MeshStandardMaterial({ color: 0x331a0a, emissive: 0x442200 });
        const noseTip = new THREE.Mesh(noseTipGeo, noseTipMat);
        noseTip.position.set(0, 0.6, 1.25);
        pandaGroup.add(noseTip);
        
        // Mouth (subtle curve)
        const mouthGeo = new THREE.TorusGeometry(0.12, 0.025, 32, 64, Math.PI);
        const mouthMat = new THREE.MeshStandardMaterial({ color: 0x553322 });
        const mouth = new THREE.Mesh(mouthGeo, mouthMat);
        mouth.rotation.x = 0.2;
        mouth.rotation.z = 0;
        mouth.position.set(0, 0.52, 1.18);
        pandaGroup.add(mouth);
        
        // Arms (realistic cylinders)
        const armGeo = new THREE.CylinderGeometry(0.22, 0.28, 0.75, 24);
        const leftArm = new THREE.Mesh(armGeo, blackFurMat);
        leftArm.position.set(-0.85, 0.15, 0.45);
        leftArm.rotation.z = 0.6;
        leftArm.rotation.x = 0.2;
        leftArm.castShadow = true;
        pandaGroup.add(leftArm);
        
        const rightArm = new THREE.Mesh(armGeo, blackFurMat);
        rightArm.position.set(0.85, 0.15, 0.45);
        rightArm.rotation.z = -0.6;
        rightArm.rotation.x = 0.2;
        rightArm.castShadow = true;
        pandaGroup.add(rightArm);
        
        // Legs
        const legGeo = new THREE.CylinderGeometry(0.26, 0.32, 0.65, 24);
        const leftLeg = new THREE.Mesh(legGeo, blackFurMat);
        leftLeg.position.set(-0.48, -0.65, 0.25);
        leftLeg.castShadow = true;
        pandaGroup.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(legGeo, blackFurMat);
        rightLeg.position.set(0.48, -0.65, 0.25);
        rightLeg.castShadow = true;
        pandaGroup.add(rightLeg);
        
        // Subtle fur texture effect (small particles around panda)
        const furParticleCount = 800;
        const furParticleGeo = new THREE.BufferGeometry();
        const furPositions = new Float32Array(furParticleCount * 3);
        for (let i = 0; i < furParticleCount; i++) {
            furPositions[i*3] = (Math.random() - 0.5) * 2.2;
            furPositions[i*3+1] = Math.random() * 1.8 - 0.3;
            furPositions[i*3+2] = (Math.random() - 0.5) * 1.8 + 0.3;
        }
        furParticleGeo.setAttribute('position', new THREE.BufferAttribute(furPositions, 3));
        const furParticleMat = new THREE.PointsMaterial({ color: 0x2a2a2a, size: 0.012, transparent: true, opacity: 0.3 });
        const furParticles = new THREE.Points(furParticleGeo, furParticleMat);
        pandaGroup.add(furParticles);
        
        scene.add(pandaGroup);
        
        // ========== MOUSE PARALLAX EFFECT (Matches your index.html style) ==========
        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = (e.clientY / window.innerHeight) * 2 - 1;
        });
        
        // ========== WALKING ANIMATION ==========
        let walkProgress = 0;
        let isWalking = true;
        let armSwing = 0;
        
        pandaGroup.position.x = -5;
        pandaGroup.position.y = 0;
        
        // ========== CELEBRATION EFFECT ==========
        function createCelebration() {
            const celebrationCount = 80;
            for (let i = 0; i < celebrationCount; i++) {
                const sparkle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.04, 8, 8),
                    new THREE.MeshStandardMaterial({ color: i % 2 === 0 ? 0x66FCF1 : 0xC3073F, emissive: i % 2 === 0 ? 0x226666 : 0x662222, emissiveIntensity: 0.6 })
                );
                sparkle.position.set(
                    (Math.random() - 0.5) * 2.5,
                    Math.random() * 2.5,
                    (Math.random() - 0.5) * 2
                );
                pandaGroup.add(sparkle);
                
                let yPos = sparkle.position.y;
                let life = 1;
                const animateSparkle = setInterval(() => {
                    yPos += 0.04;
                    sparkle.position.y = yPos;
                    sparkle.scale.multiplyScalar(0.96);
                    life -= 0.02;
                    if (yPos > 2.5 || sparkle.scale.x < 0.1) {
                        clearInterval(animateSparkle);
                        pandaGroup.remove(sparkle);
                    }
                }, 30);
            }
        }
        
        // ========== ANIMATION LOOP ==========
        let time = 0;
        let blinked = false;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            armSwing += 0.15;
            
            // Panda walking animation
            if (isWalking && pandaGroup.position.x < 0) {
                pandaGroup.position.x += 0.025;
                pandaGroup.position.y = Math.sin(time * 8) * 0.03;
                
                // Arm swinging
                if (leftArm && rightArm) {
                    leftArm.rotation.x = 0.2 + Math.sin(armSwing) * 0.4;
                    rightArm.rotation.x = 0.2 - Math.sin(armSwing) * 0.4;
                }
                
                // Slight head bob
                head.rotation.z = Math.sin(armSwing * 2) * 0.05;
            } else if (isWalking && pandaGroup.position.x >= 0) {
                isWalking = false;
                pandaGroup.position.x = 0;
                createCelebration();
            }
            
            // Idle animation
            if (!isWalking) {
                pandaGroup.rotation.z = Math.sin(time * 0.8) * 0.02;
                pandaGroup.position.y = Math.sin(time * 1.2) * 0.015;
                head.rotation.z = Math.sin(time * 0.5) * 0.03;
                
                // Subtle ear movement
                leftEar.rotation.z = Math.sin(time * 1.5) * 0.03;
                rightEar.rotation.z = -Math.sin(time * 1.5) * 0.03;
                
                // Blink effect every 4 seconds
                if (!blinked && Math.floor(time * 10) % 200 === 0) {
                    blinked = true;
                    leftPupil.scale.y = 0.05;
                    rightPupil.scale.y = 0.05;
                    setTimeout(() => {
                        leftPupil.scale.y = 1;
                        rightPupil.scale.y = 1;
                        blinked = false;
                    }, 120);
                }
            }
            
            // Rotate fur particles
            furParticles.rotation.y += 0.01;
            furParticles.rotation.x = Math.sin(time * 0.3) * 0.1;
            
            // Rotate background particles
            particles.rotation.y += 0.001;
            particles.rotation.x += 0.0005;
            
            // Mouse parallax effect (like your index.html)
            camera.position.x += (mouseX * 0.8 - camera.position.x) * 0.05;
            camera.position.y += (-mouseY * 0.5 + 2 - camera.position.y) * 0.05;
            camera.lookAt(0, 1.2, 0);
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // ========== PANDA CLICK HANDLER ==========
        const raycaster = new THREE.Raycaster();
        const clickMouse = new THREE.Vector2();
        
        function onPandaClick(event) {
            if (isWalking) return;
            
            clickMouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            clickMouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(clickMouse, camera);
            const intersects = raycaster.intersectObject(pandaGroup, true);
            
            if (intersects.length > 0) {
                // Create ripple effect
                const ripple = document.createElement('div');
                ripple.style.position = 'fixed';
                ripple.style.left = event.clientX + 'px';
                ripple.style.top = event.clientY + 'px';
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                ripple.style.background = 'radial-gradient(circle, #66FCF1, transparent)';
                ripple.style.borderRadius = '50%';
                ripple.style.pointerEvents = 'none';
                ripple.style.zIndex = '2000';
                ripple.style.animation = 'rippleExpand 0.6s ease-out forwards';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
                
                // Show modal
                showReturnModal();
            }
        }
        
        function showReturnModal() {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.background = 'rgba(0,0,0,0.85)';
            modal.style.backdropFilter = 'blur(20px)';
            modal.style.zIndex = '3000';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.animation = 'fadeIn 0.3s ease';
            
            modal.innerHTML = `
                <div style="background: linear-gradient(135deg, #0F1A2F, #1A2A3F); border-radius: 48px; padding: 45px; max-width: 500px; width: 90%; border: 2px solid #66FCF1; box-shadow: 0 40px 80px rgba(0,0,0,0.5); text-align: center; animation: slideUpModal 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);">
                    <i class="fas fa-panda" style="font-size: 70px; color: #66FCF1; filter: drop-shadow(0 0 20px rgba(102,252,241,0.5)); margin-bottom: 20px; display: block;"></i>
                    <h2 style="color: #66FCF1; margin-bottom: 15px; font-size: 1.8rem;">Welcome Back!</h2>
                    <p style="color: #CCDEFF; margin-bottom: 25px; line-height: 1.6;">Ready to complete your application journey? Our team is excited to review your profile.</p>
                    <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
                        <button id="modalRedirectBtn" style="background: linear-gradient(135deg, #66FCF1, #2C5F8A); border: none; padding: 14px 32px; border-radius: 50px; color: #0A1428; font-weight: bold; cursor: pointer; font-size: 1rem;">
                            <i class="fas fa-paper-plane"></i> Continue Application
                        </button>
                        <button id="modalCloseBtn" style="background: transparent; border: 2px solid #66FCF1; padding: 14px 28px; border-radius: 50px; color: #66FCF1; cursor: pointer;">
                            <i class="fas fa-times"></i> Stay Here
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            document.getElementById('modalRedirectBtn').onclick = () => {
                window.location.href = 'index.html';
            };
            
            document.getElementById('modalCloseBtn').onclick = () => {
                modal.style.animation = 'fadeOut 0.2s ease';
                setTimeout(() => modal.remove(), 200);
            };
        }
        
        // Add CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleExpand {
                0% { transform: scale(0); opacity: 0.8; }
                100% { transform: scale(50); opacity: 0; }
            }
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            @keyframes fadeOut {
                to { opacity: 0; }
            }
            @keyframes slideUpModal {
                from { transform: translateY(50px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
        `;
        document.head.appendChild(style);
        
        window.addEventListener('click', onPandaClick);
        
        // ========== RESIZE HANDLER (Matches your index.html style) ==========
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
        
        // ========== COUNTDOWN TIMER ==========
        function getStoredTargetTime() {
            let targetTime = localStorage.getItem('sarr_reply_target_time');
            if (!targetTime) {
                const randomHours = Math.floor(Math.random() * (48 - 24 + 1) + 24);
                targetTime = new Date().getTime() + (randomHours * 60 * 60 * 1000);
                localStorage.setItem('sarr_reply_target_time', targetTime);
                localStorage.setItem('sarr_reply_hours', randomHours);
            }
            return parseInt(targetTime);
        }
        
        function getStoredReplyHours() {
            let hours = localStorage.getItem('sarr_reply_hours');
            if (!hours) {
                hours = Math.floor(Math.random() * (48 - 24 + 1) + 24);
                localStorage.setItem('sarr_reply_hours', hours);
            }
            return parseInt(hours);
        }
        
        function updateCountdown() {
            const targetTime = getStoredTargetTime();
            const now = new Date().getTime();
            const distance = targetTime - now;
            
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');
            const replyTimeEl = document.getElementById('replyTime');
            
            if (distance < 0) {
                if (hoursEl) hoursEl.textContent = '00';
                if (minutesEl) minutesEl.textContent = '00';
                if (secondsEl) secondsEl.textContent = '00';
                if (replyTimeEl) replyTimeEl.textContent = 'Ready!';
                return;
            }
            
            const hoursLeft = Math.floor(distance / (1000 * 60 * 60));
            const minutesLeft = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const secondsLeft = Math.floor((distance % (1000 * 60)) / 1000);
            
            if (hoursEl) hoursEl.textContent = hoursLeft.toString().padStart(2, '0');
            if (minutesEl) minutesEl.textContent = minutesLeft.toString().padStart(2, '0');
            if (secondsEl) secondsEl.textContent = secondsLeft.toString().padStart(2, '0');
            
            const totalHours = getStoredReplyHours();
            if (replyTimeEl) replyTimeEl.textContent = `${totalHours} Hours ${minutesLeft} Min`;
        }
        
        // ========== GET URL PARAMETERS ==========
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                name: params.get('name') || '',
                applicationId: params.get('appId') || '',
                email: params.get('email') || ''
            };
        }
        
        function formatName(name) {
            if (!name) return 'Valued Applicant';
            try {
                return decodeURIComponent(name);
            } catch (e) {
                return name;
            }
        }
        
        // ========== INITIALIZE UI ==========
        document.addEventListener('DOMContentLoaded', () => {
            const params = getUrlParams();
            let studentName = formatName(params.name);
            const applicationId = params.applicationId || 'SARR-' + Date.now().toString(36).toUpperCase();
            
            const savedData = localStorage.getItem('sarr_last_applicant');
            if ((!studentName || studentName === 'Valued Applicant') && savedData) {
                try {
                    const data = JSON.parse(savedData);
                    studentName = data.name || studentName;
                } catch(e) {}
            }
            
            const nameEl = document.getElementById('studentName');
            const idEl = document.getElementById('applicationId');
            if (nameEl) nameEl.textContent = studentName;
            if (idEl) idEl.textContent = applicationId;
            
            localStorage.setItem('sarr_last_applicant', JSON.stringify({
                name: studentName,
                appId: applicationId,
                email: params.email
            }));
            
            updateCountdown();
            setInterval(updateCountdown, 1000);
            
            const backBtn = document.getElementById('backToFormBtn');
            const trackBtn = document.getElementById('trackBtn');
            
            if (backBtn) backBtn.onclick = () => window.location.href = 'index.html';
            if (trackBtn) trackBtn.onclick = () => {
                alert(`📋 Application ID: ${applicationId}\n👤 Name: ${studentName}\n⏰ Expected Response: Within ${getStoredReplyHours()} hours\n\nPlease check your email for updates.`);
            };
        });
        
        console.log('🐼 Realistic 3D Panda loaded! Click on panda to return to form.');
    </script>
</body>
</html>
