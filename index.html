<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SARR Institute | 3D Panda Greeting | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #0A0F1A;
            color: #fff;
        }

        /* Canvas 3D Background */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Premium UI Overlay */
        .ui-overlay {
            position: relative;
            z-index: 100;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            pointer-events: none;
        }

        .greeting-container {
            max-width: 600px;
            width: 100%;
            pointer-events: auto;
            animation: floatIn 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Premium Glass Card */
        .greeting-card {
            background: rgba(10, 20, 35, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            border: 1px solid rgba(102, 252, 241, 0.3);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(102, 252, 241, 0.2) inset, 0 0 40px rgba(102, 252, 241, 0.1);
            padding: 48px 40px;
            text-align: center;
            transition: all 0.4s ease;
        }

        .greeting-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 50px 90px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(102, 252, 241, 0.3) inset;
        }

        /* Success Icon */
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(102, 252, 241, 0.2), rgba(195, 7, 63, 0.2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            border: 2px solid rgba(102, 252, 241, 0.6);
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(102, 252, 241, 0.4);
                border-color: rgba(102, 252, 241, 0.6);
            }
            50% {
                box-shadow: 0 0 0 25px rgba(102, 252, 241, 0);
                border-color: rgba(102, 252, 241, 1);
            }
        }

        .success-icon i {
            font-size: 48px;
            background: linear-gradient(135deg, #66FCF1, #C3073F);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Typography */
        .greeting-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #66FCF1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .student-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #66FCF1;
            margin-bottom: 16px;
            text-shadow: 0 0 20px rgba(102, 252, 241, 0.5);
            animation: textGlow 2s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(102, 252, 241, 0.3); }
            50% { text-shadow: 0 0 30px rgba(102, 252, 241, 0.8); }
        }

        .application-id {
            background: rgba(102, 252, 241, 0.12);
            border-radius: 40px;
            padding: 10px 24px;
            display: inline-block;
            margin: 15px 0;
            font-family: monospace;
            font-size: 0.85rem;
            color: #66FCF1;
            border: 1px solid rgba(102, 252, 241, 0.3);
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }

        /* Reply Section */
        .reply-section {
            background: linear-gradient(135deg, rgba(102, 252, 241, 0.08), rgba(195, 7, 63, 0.05));
            border-radius: 40px;
            padding: 28px;
            margin: 30px 0;
            border: 1px solid rgba(102, 252, 241, 0.25);
            position: relative;
            overflow: hidden;
        }

        .reply-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 252, 241, 0.1), transparent 70%);
            animation: shimmerSlow 6s ease-in-out infinite;
        }

        @keyframes shimmerSlow {
            0% { transform: translate(-20%, -20%) rotate(0deg); opacity: 0; }
            50% { transform: translate(0%, 0%) rotate(5deg); opacity: 0.5; }
            100% { transform: translate(20%, 20%) rotate(10deg); opacity: 0; }
        }

        .reply-time {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #66FCF1, #C3073F);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .reply-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #9BB4D4;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .reply-description {
            color: #CCDEFF;
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
        }

        /* Countdown */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: rgba(10, 20, 35, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 15px 22px;
            min-width: 90px;
            border: 1px solid rgba(102, 252, 241, 0.25);
            transition: all 0.3s;
            animation: countdownPulse 2s infinite;
        }

        @keyframes countdownPulse {
            0%, 100% { border-color: rgba(102, 252, 241, 0.25); }
            50% { border-color: rgba(102, 252, 241, 0.6); }
        }

        .countdown-number {
            font-size: 2rem;
            font-weight: 800;
            color: #66FCF1;
            font-family: monospace;
        }

        .countdown-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #9BB4D4;
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #66FCF1, #2C5F8A);
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            color: #0A1428;
            font-weight: 700;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(102, 252, 241, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #66FCF1;
            padding: 12px 28px;
            border-radius: 60px;
            color: #66FCF1;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-outline:hover {
            background: rgba(102, 252, 241, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 252, 241, 0.2);
        }

        /* Click Indicator for 3D Panda */
        .click-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 24px;
            border-radius: 50px;
            color: #66FCF1;
            font-size: 0.85rem;
            z-index: 200;
            pointer-events: none;
            animation: bounceHint 1.5s ease-in-out infinite;
            border: 1px solid rgba(102, 252, 241, 0.3);
            white-space: nowrap;
        }

        @keyframes bounceHint {
            0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.7; }
            50% { transform: translateX(-50%) translateY(-8px); opacity: 1; }
        }

        @media (max-width: 600px) {
            .greeting-card { padding: 32px 24px; }
            .greeting-title { font-size: 1.6rem; }
            .student-name { font-size: 1.3rem; }
            .reply-time { font-size: 1.5rem; }
            .countdown-item { padding: 10px 16px; min-width: 70px; }
            .countdown-number { font-size: 1.4rem; }
            .click-hint { font-size: 0.7rem; padding: 6px 16px; white-space: nowrap; bottom: 15px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="ui-overlay">
        <div class="greeting-container">
            <div class="greeting-card">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1 class="greeting-title">Application Received!</h1>
                <div class="student-name" id="studentName">Loading...</div>
                <div class="application-id" id="applicationId"></div>
                
                <div class="reply-section">
                    <div class="reply-label"><i class="fas fa-clock"></i> ESTIMATED RESPONSE TIME</div>
                    <div class="reply-time" id="replyTime">24-48 Hours</div>
                    <div class="reply-description">
                        <i class="fas fa-envelope"></i> Our admissions team will contact you shortly
                    </div>
                </div>
                
                <div class="countdown" id="countdown">
                    <div class="countdown-item"><div class="countdown-number" id="hours">00</div><div class="countdown-label">Hours</div></div>
                    <div class="countdown-item"><div class="countdown-number" id="minutes">00</div><div class="countdown-label">Minutes</div></div>
                    <div class="countdown-item"><div class="countdown-number" id="seconds">00</div><div class="countdown-label">Seconds</div></div>
                </div>
                
                <div class="button-group">
                    <button class="btn-primary" id="backToFormBtn"><i class="fas fa-pen-fancy"></i> Back to Application</button>
                    <button class="btn-outline" id="trackBtn"><i class="fas fa-chart-line"></i> Track Status</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="click-hint" id="clickHint">
        <i class="fas fa-hand-pointer"></i> Click on Panda to Return to Form
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // ========== 3D PANDA CREATION ==========
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0A0F1A);
        scene.fog = new THREE.FogExp2(0x0A0F1A, 0.008);

        // Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 1.5, 0);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Controls for interactive camera (optional)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.target.set(0, 1.5, 0);
        controls.maxPolarAngle = Math.PI / 2.5;

        // ========== LIGHTS ==========
        // Ambient Light
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        // Main Directional Light
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        
        // Fill Light
        const fillLight = new THREE.PointLight(0x66FCF1, 0.5);
        fillLight.position.set(-2, 3, 4);
        scene.add(fillLight);
        
        // Back Rim Light
        const rimLight = new THREE.PointLight(0xC3073F, 0.4);
        rimLight.position.set(0, 2, -4);
        scene.add(rimLight);
        
        // Ground fill light
        const groundLight = new THREE.PointLight(0x2C5F8A, 0.3);
        groundLight.position.set(0, -1, 0);
        scene.add(groundLight);
        
        // Floating particles for magic effect
        const particleCount = 800;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 25;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 15 + 2;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 20 - 5;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({
            color: 0x66FCF1,
            size: 0.05,
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // Ground reflection effect (invisible plane for shadows)
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(12, 12),
            new THREE.ShadowMaterial({ opacity: 0.4, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -1.2;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // ========== CREATE 3D PANDA ==========
        const pandaGroup = new THREE.Group();
        
        // Body (black)
        const bodyGeo = new THREE.SphereGeometry(0.9, 64, 64);
        const blackMat = new THREE.MeshStandardMaterial({ color: 0x2C2C2C, roughness: 0.3, metalness: 0.1, emissive: 0x111111 });
        const body = new THREE.Mesh(bodyGeo, blackMat);
        body.position.y = -0.2;
        body.castShadow = true;
        body.receiveShadow = true;
        pandaGroup.add(body);
        
        // Belly (white)
        const bellyGeo = new THREE.SphereGeometry(0.7, 64, 64);
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xF5F5F5, roughness: 0.4, metalness: 0.05 });
        const belly = new THREE.Mesh(bellyGeo, whiteMat);
        belly.position.y = -0.1;
        belly.position.z = 0.4;
        belly.castShadow = true;
        pandaGroup.add(belly);
        
        // Head
        const headGeo = new THREE.SphereGeometry(0.75, 64, 64);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.3 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 0.65;
        head.position.z = 0.1;
        head.castShadow = true;
        pandaGroup.add(head);
        
        // Left Ear (black)
        const earGeo = new THREE.SphereGeometry(0.45, 48, 48);
        const leftEar = new THREE.Mesh(earGeo, blackMat);
        leftEar.position.set(-0.55, 1.15, 0.05);
        leftEar.castShadow = true;
        pandaGroup.add(leftEar);
        
        // Right Ear
        const rightEar = new THREE.Mesh(earGeo, blackMat);
        rightEar.position.set(0.55, 1.15, 0.05);
        rightEar.castShadow = true;
        pandaGroup.add(rightEar);
        
        // Eye Patches (black)
        const patchGeo = new THREE.SphereGeometry(0.35, 48, 48);
        const leftPatch = new THREE.Mesh(patchGeo, blackMat);
        leftPatch.position.set(-0.45, 0.85, 0.55);
        leftPatch.castShadow = true;
        pandaGroup.add(leftPatch);
        
        const rightPatch = new THREE.Mesh(patchGeo, blackMat);
        rightPatch.position.set(0.45, 0.85, 0.55);
        rightPatch.castShadow = true;
        pandaGroup.add(rightPatch);
        
        // Eyes (white part)
        const eyeWhiteGeo = new THREE.SphereGeometry(0.22, 48, 48);
        const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF });
        const leftEyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
        leftEyeWhite.position.set(-0.45, 0.85, 0.85);
        pandaGroup.add(leftEyeWhite);
        
        const rightEyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
        rightEyeWhite.position.set(0.45, 0.85, 0.85);
        pandaGroup.add(rightEyeWhite);
        
        // Pupils (with glow effect)
        const pupilGeo = new THREE.SphereGeometry(0.12, 48, 48);
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x111111 });
        const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
        leftPupil.position.set(-0.45, 0.82, 1.05);
        pandaGroup.add(leftPupil);
        
        const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
        rightPupil.position.set(0.45, 0.82, 1.05);
        pandaGroup.add(rightPupil);
        
        // Eye Glow (small highlight)
        const highlightGeo = new THREE.SphereGeometry(0.05, 32, 32);
        const highlightMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, emissive: 0x66FCF1, emissiveIntensity: 0.5 });
        const leftHighlight = new THREE.Mesh(highlightGeo, highlightMat);
        leftHighlight.position.set(-0.5, 0.9, 1.1);
        pandaGroup.add(leftHighlight);
        
        const rightHighlight = new THREE.Mesh(highlightGeo, highlightMat);
        rightHighlight.position.set(0.4, 0.9, 1.1);
        pandaGroup.add(rightHighlight);
        
        // Nose (black with pink tint)
        const noseGeo = new THREE.SphereGeometry(0.12, 48, 48);
        const noseMat = new THREE.MeshStandardMaterial({ color: 0xC3073F, emissive: 0x330000 });
        const nose = new THREE.Mesh(noseGeo, noseMat);
        nose.position.set(0, 0.65, 1.05);
        pandaGroup.add(nose);
        
        // Mouth line
        const mouthCurve = new THREE.CubicBezierCurve3(
            new THREE.Vector3(-0.15, 0.55, 1.1),
            new THREE.Vector3(-0.08, 0.5, 1.15),
            new THREE.Vector3(0.08, 0.5, 1.15),
            new THREE.Vector3(0.15, 0.55, 1.1)
        );
        const mouthGeometry = new THREE.TubeGeometry(mouthCurve, 20, 0.03, 8, false);
        const mouthMat = new THREE.MeshStandardMaterial({ color: 0x553322 });
        const mouth = new THREE.Mesh(mouthGeometry, mouthMat);
        pandaGroup.add(mouth);
        
        // Cheeks (pink blush)
        const blushGeo = new THREE.SphereGeometry(0.12, 32, 32);
        const blushMat = new THREE.MeshStandardMaterial({ color: 0xFFAAAA, emissive: 0x442222 });
        const leftCheek = new THREE.Mesh(blushGeo, blushMat);
        leftCheek.position.set(-0.65, 0.55, 0.85);
        pandaGroup.add(leftCheek);
        
        const rightCheek = new THREE.Mesh(blushGeo, blushMat);
        rightCheek.position.set(0.65, 0.55, 0.85);
        pandaGroup.add(rightCheek);
        
        // Arms (simple cylinders)
        const armGeo = new THREE.CylinderGeometry(0.2, 0.25, 0.7, 16);
        const leftArm = new THREE.Mesh(armGeo, blackMat);
        leftArm.position.set(-0.85, 0.2, 0.3);
        leftArm.rotation.z = 0.5;
        leftArm.rotation.x = 0.3;
        leftArm.castShadow = true;
        pandaGroup.add(leftArm);
        
        const rightArm = new THREE.Mesh(armGeo, blackMat);
        rightArm.position.set(0.85, 0.2, 0.3);
        rightArm.rotation.z = -0.5;
        rightArm.rotation.x = 0.3;
        rightArm.castShadow = true;
        pandaGroup.add(rightArm);
        
        // Legs
        const legGeo = new THREE.CylinderGeometry(0.25, 0.3, 0.6, 16);
        const leftLeg = new THREE.Mesh(legGeo, blackMat);
        leftLeg.position.set(-0.45, -0.55, 0.2);
        leftLeg.castShadow = true;
        pandaGroup.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(legGeo, blackMat);
        rightLeg.position.set(0.45, -0.55, 0.2);
        rightLeg.castShadow = true;
        pandaGroup.add(rightLeg);
        
        // Add a glowing aura around panda
        const auraGeometry = new THREE.SphereGeometry(1.4, 32, 32);
        const auraMaterial = new THREE.MeshBasicMaterial({
            color: 0x66FCF1,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide
        });
        const aura = new THREE.Mesh(auraGeometry, auraMaterial);
        pandaGroup.add(aura);
        
        scene.add(pandaGroup);
        
        // Floating particles around panda (sparkles)
        const sparkleCount = 300;
        const sparkleGeometry = new THREE.BufferGeometry();
        const sparklePositions = new Float32Array(sparkleCount * 3);
        for (let i = 0; i < sparkleCount; i++) {
            sparklePositions[i*3] = (Math.random() - 0.5) * 2.5;
            sparklePositions[i*3+1] = Math.random() * 2;
            sparklePositions[i*3+2] = (Math.random() - 0.5) * 2 + 0.5;
        }
        sparkleGeometry.setAttribute('position', new THREE.BufferAttribute(sparklePositions, 3));
        const sparkleMat = new THREE.PointsMaterial({
            color: 0x66FCF1,
            size: 0.03,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        const sparkles = new THREE.Points(sparkleGeometry, sparkleMat);
        pandaGroup.add(sparkles);
        
        // ========== ANIMATION VARIABLES ==========
        let time = 0;
        let walkPhase = 0;
        let isWalking = true;
        let targetPosition = 0;
        let startPosition = -4;
        let pandaWalked = false;
        
        // Panda walk from left to center
        pandaGroup.position.x = -4;
        pandaGroup.position.y = 0;
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            walkPhase += 0.12;
            
            // Walking animation - move panda from left to center
            if (isWalking && pandaGroup.position.x < 0) {
                pandaGroup.position.x += 0.02;
                
                // Walking bounce effect
                pandaGroup.position.y = Math.abs(Math.sin(walkPhase * 2)) * 0.05;
                
                // Arm swinging
                if (leftArm && rightArm) {
                    leftArm.rotation.x = 0.3 + Math.sin(walkPhase * 3) * 0.3;
                    rightArm.rotation.x = 0.3 - Math.sin(walkPhase * 3) * 0.3;
                }
            } else if (isWalking && pandaGroup.position.x >= 0) {
                isWalking = false;
                pandaGroup.position.x = 0;
                pandaWalked = true;
                
                // Celebration effect - create floating hearts/particles
                createCelebrationEffect();
            }
            
            // Idle animation (gentle sway)
            if (!isWalking) {
                pandaGroup.rotation.z = Math.sin(time * 0.5) * 0.03;
                pandaGroup.position.y = Math.sin(time * 1.2) * 0.02;
                
                // Blink effect every 3 seconds
                if (Math.floor(time * 2) % 180 === 0) {
                    blinkPupils();
                }
            }
            
            // Rotate sparkles around panda
            sparkles.rotation.y += 0.02;
            sparkles.rotation.x = Math.sin(time * 0.5) * 0.1;
            
            // Rotate particles
            particles.rotation.y += 0.001;
            particles.rotation.x += 0.0005;
            
            // Update controls
            controls.update();
            
            // Render
            renderer.render(scene, camera);
        }
        
        function blinkPupils() {
            if (leftPupil && rightPupil) {
                leftPupil.scale.y = 0.05;
                rightPupil.scale.y = 0.05;
                setTimeout(() => {
                    leftPupil.scale.y = 1;
                    rightPupil.scale.y = 1;
                }, 100);
            }
        }
        
        function createCelebrationEffect() {
            // Create floating heart particles
            const heartCount = 50;
            for (let i = 0; i < heartCount; i++) {
                const heartGeometry = new THREE.SphereGeometry(0.05, 8, 8);
                const heartMat = new THREE.MeshStandardMaterial({ 
                    color: i % 2 === 0 ? 0x66FCF1 : 0xC3073F,
                    emissive: i % 2 === 0 ? 0x226666 : 0x662222,
                    emissiveIntensity: 0.5
                });
                const heart = new THREE.Mesh(heartGeometry, heartMat);
                heart.position.set(
                    (Math.random() - 0.5) * 2,
                    Math.random() * 2,
                    (Math.random() - 0.5) * 2
                );
                pandaGroup.add(heart);
                
                // Animate heart upward
                let yPos = heart.position.y;
                const animateHeart = setInterval(() => {
                    yPos += 0.03;
                    heart.position.y = yPos;
                    heart.scale.multiplyScalar(0.98);
                    if (yPos > 3 || heart.scale.x < 0.1) {
                        clearInterval(animateHeart);
                        pandaGroup.remove(heart);
                    }
                }, 50);
            }
        }
        
        // ========== CLICK HANDLER FOR PANDA ==========
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        function onMouseClick(event) {
            if (!pandaWalked) return;
            
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(pandaGroup, true);
            
            if (intersects.length > 0) {
                // Panda clicked - show premium modal
                showReturnModal();
            }
        }
        
        function showReturnModal() {
            // Create ripple effect
            const ripple = document.createElement('div');
            ripple.style.position = 'fixed';
            ripple.style.top = '50%';
            ripple.style.left = '50%';
            ripple.style.width = '100px';
            ripple.style.height = '100px';
            ripple.style.background = 'radial-gradient(circle, #66FCF1, transparent)';
            ripple.style.borderRadius = '50%';
            ripple.style.transform = 'translate(-50%, -50%) scale(0)';
            ripple.style.pointerEvents = 'none';
            ripple.style.zIndex = '2000';
            ripple.style.animation = 'rippleExpand 0.6s ease-out forwards';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
            
            // Create modal
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.background = 'rgba(0,0,0,0.85)';
            modal.style.backdropFilter = 'blur(20px)';
            modal.style.zIndex = '3000';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.animation = 'fadeIn 0.3s ease';
            
            modal.innerHTML = `
                <div style="background: linear-gradient(135deg, #0F1A2F, #1A2A3F); border-radius: 56px; padding: 45px; max-width: 500px; width: 90%; border: 2px solid #66FCF1; box-shadow: 0 40px 80px rgba(0,0,0,0.5); text-align: center; animation: slideUpModal 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);">
                    <div style="position: relative; margin-bottom: 25px;">
                        <i class="fas fa-panda" style="font-size: 70px; color: #66FCF1; filter: drop-shadow(0 0 20px rgba(102,252,241,0.5));"></i>
                        <div style="position: absolute; top: -10px; right: -10px; width: 30px; height: 30px; background: #C3073F; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: pulse 1s infinite;">
                            <i class="fas fa-heart" style="font-size: 16px; color: white;"></i>
                        </div>
                    </div>
                    <h2 style="color: #66FCF1; margin-bottom: 15px; font-size: 1.8rem;">Welcome Back!</h2>
                    <p style="color: #CCDEFF; margin-bottom: 25px; line-height: 1.6;">Ready to complete your application journey? Our team is excited to review your profile.</p>
                    <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
                        <button id="modalRedirectBtn" style="background: linear-gradient(135deg, #66FCF1, #2C5F8A); border: none; padding: 14px 32px; border-radius: 50px; color: #0A1428; font-weight: bold; cursor: pointer; flex: 1; font-size: 1rem;">
                            <i class="fas fa-paper-plane"></i> Continue Application
                        </button>
                        <button id="modalCloseBtn" style="background: transparent; border: 2px solid #66FCF1; padding: 14px 28px; border-radius: 50px; color: #66FCF1; cursor: pointer;">
                            <i class="fas fa-times"></i> Stay Here
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            document.getElementById('modalRedirectBtn').onclick = () => {
                window.location.href = 'index.html';
            };
            
            document.getElementById('modalCloseBtn').onclick = () => {
                modal.style.animation = 'fadeOut 0.2s ease';
                setTimeout(() => modal.remove(), 200);
            };
        }
        
        // Add CSS animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes rippleExpand {
                0% { transform: translate(-50%, -50%) scale(0); opacity: 0.8; }
                100% { transform: translate(-50%, -50%) scale(20); opacity: 0; }
            }
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }
            @keyframes fadeOut {
                to { opacity: 0; }
            }
            @keyframes slideUpModal {
                from { transform: translateY(50px); opacity: 0; }
                to { transform: translateY(0); opacity: 1; }
            }
            @keyframes pulse {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.1); }
            }
        `;
        document.head.appendChild(style);
        
        window.addEventListener('click', onMouseClick);
        
        // ========== PERSISTENT COUNTDOWN TIMER ==========
        function getStoredTargetTime() {
            let targetTime = localStorage.getItem('sarr_reply_target_time');
            if (!targetTime) {
                const randomHours = Math.floor(Math.random() * (48 - 24 + 1) + 24);
                targetTime = new Date().getTime() + (randomHours * 60 * 60 * 1000);
                localStorage.setItem('sarr_reply_target_time', targetTime);
                localStorage.setItem('sarr_reply_hours', randomHours);
            }
            return parseInt(targetTime);
        }
        
        function getStoredReplyHours() {
            let hours = localStorage.getItem('sarr_reply_hours');
            if (!hours) {
                hours = Math.floor(Math.random() * (48 - 24 + 1) + 24);
                localStorage.setItem('sarr_reply_hours', hours);
            }
            return parseInt(hours);
        }
        
        function updateCountdown() {
            const targetTime = getStoredTargetTime();
            const now = new Date().getTime();
            const distance = targetTime - now;
            
            const hoursElement = document.getElementById('hours');
            const minutesElement = document.getElementById('minutes');
            const secondsElement = document.getElementById('seconds');
            const replyTimeElement = document.getElementById('replyTime');
            
            if (distance < 0) {
                hoursElement.textContent = '00';
                minutesElement.textContent = '00';
                secondsElement.textContent = '00';
                replyTimeElement.textContent = 'Ready!';
                return;
            }
            
            const hoursLeft = Math.floor(distance / (1000 * 60 * 60));
            const minutesLeft = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const secondsLeft = Math.floor((distance % (1000 * 60)) / 1000);
            
            hoursElement.textContent = hoursLeft.toString().padStart(2, '0');
            minutesElement.textContent = minutesLeft.toString().padStart(2, '0');
            secondsElement.textContent = secondsLeft.toString().padStart(2, '0');
            
            const totalHours = getStoredReplyHours();
            replyTimeElement.textContent = `${totalHours} Hours ${minutesLeft} Min`;
        }
        
        // ========== GET URL PARAMETERS ==========
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                name: params.get('name') || '',
                applicationId: params.get('appId') || '',
                email: params.get('email') || ''
            };
        }
        
        function formatName(name) {
            if (!name) return 'Valued Applicant';
            try {
                return decodeURIComponent(name);
            } catch (e) {
                return name;
            }
        }
        
        // ========== INITIALIZE ==========
        document.addEventListener('DOMContentLoaded', () => {
            const params = getUrlParams();
            let studentName = formatName(params.name);
            const applicationId = params.applicationId || 'SARR-' + Date.now().toString(36).toUpperCase();
            
            // Try localStorage fallback
            if (!studentName || studentName === 'Valued Applicant') {
                const savedData = localStorage.getItem('sarr_last_applicant');
                if (savedData) {
                    try {
                        const data = JSON.parse(savedData);
                        studentName = data.name || studentName;
                    } catch(e) {}
                }
            }
            
            document.getElementById('studentName').textContent = studentName;
            document.getElementById('applicationId').textContent = applicationId;
            
            localStorage.setItem('sarr_last_applicant', JSON.stringify({
                name: studentName,
                appId: applicationId,
                email: params.email
            }));
            
            updateCountdown();
            setInterval(updateCountdown, 1000);
            
            document.getElementById('backToFormBtn').onclick = () => window.location.href = 'index.html';
            document.getElementById('trackBtn').onclick = () => {
                alert(`📋 Application ID: ${applicationId}\n👤 Name: ${studentName}\n⏰ Expected Response: Within ${getStoredReplyHours()} hours\n\nPlease check your email for updates.`);
            };
        });
        
        // Start animation
        animate();
        
        // Handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('🎋 3D Panda loaded! Click on panda to return to form.');
    </script>
</body>
</html>
